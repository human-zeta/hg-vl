<script>
'use strict';
const $ = id => document.getElementById(id);
const cv = $('gl'), vid = $('vid');
const gl = cv.getContext('webgl2', { preserveDrawingBuffer:true, antialias:false });
if(!gl){ document.body.innerHTML = '<p style="padding:40px;font-family:monospace;color:#b8ff00">WARP necesita WebGL2 — probá en un navegador actualizado.</p>'; throw new Error('no webgl2'); }

const MODES = ['WARP','RGB SPLIT','KALEIDO','RIPPLE','SLITSCAN','MIRROR','MOSAICO','LENTE','SACUDÓN'];

// ── estado ──
const P = { mode:0, warp:0.5, scale:2.5, shift:0.4, sym:0, speed:0.5, trails:0.4, glitch:0.15, audgain:1.2 };
let hasInput = 0, flipX = 0, audMode = 'off';

// ════════════════════════════════════════════════════════════════════
// GLSL — la lógica de distorsión vive en distortUV()/sampleSrc(); el mismo
// cuerpo se reusa para el preview (acá) y para el export a Synesthesia.
// ════════════════════════════════════════════════════════════════════
const FX_BODY = `
float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1.0,0.0)),u.x),mix(hash(i+vec2(0.0,1.0)),hash(i+vec2(1.0,1.0)),u.x),u.y); }
vec2 kaleido(vec2 p, float folds){ if(folds<0.5) return p;
  float a=atan(p.y,p.x); float r=length(p); float seg=3.14159265/folds;
  a=abs(mod(a,2.0*seg)-seg); return vec2(cos(a),sin(a))*r; }
// distorsiona la coordenada de muestreo (uv 0..1) según el modo + audio
vec2 distortUV(vec2 uv, vec2 uvc, float t, int mode, float bass, float mid, float high){
  float warp = P_warp*(1.0+bass*1.6);
  if(mode==0){               // WARP — desplazamiento por ruido
    vec2 n = vec2(vnoise(uvc*P_scale+t), vnoise(uvc*P_scale+vec2(5.2,1.3)-t));
    uv += (n-0.5)*warp*0.35;
  } else if(mode==2){        // KALEIDO
    vec2 k = kaleido(uvc*P_scale, floor(P_sym+0.5));
    uv = k*0.5+0.5;
  } else if(mode==3){        // RIPPLE — ondas radiales
    float r=length(uvc); uv += normalize(uvc+1e-5)*sin(r*P_scale*4.0 - t*3.0)*warp*0.12;
  } else if(mode==4){        // SLITSCAN — corte horizontal por fila
    uv.x += sin(uv.y*P_scale*3.0 + t*2.0)*warp*0.25 + (1.0-uv.y)*bass*warp*0.3;
  } else if(mode==5){        // MIRROR — espejo horizontal
    uv.x = abs(uv.x-0.5)+0.5;
  } else if(mode==6){        // MOSAICO — pixelado por bloques (bass)
    float bl = mix(80.0, 8.0, clamp(P_warp+bass,0.0,1.0));
    uv = (floor(uv*bl)+0.5)/bl;
  } else if(mode==7){        // LENTE — domo/fisheye
    float ar = uRes.x/uRes.y;
    vec2 c = uvc; float r = length(c);
    float k = 1.0 + warp*r*r*1.6;
    c *= k; uv = vec2(c.x/ar, c.y) + 0.5;
  } else if(mode==8){        // SACUDÓN — bloques rasgados en el beat
    float seg = floor(uv.y*20.0); float k = step(0.7, hash(vec2(seg, floor(t*8.0))));
    uv.x += (hash(vec2(seg,3.1))-0.5)*k*(warp*0.5+high*0.4);
  }
  return uv;
}`;

// Preview-only: cabecera con uniforms WebGL2 y wrappers. El export reescribe
// estos nombres a los de Synesthesia (syn_BassLevel, _loadMedia, etc.).
const FX_FRAG = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform sampler2D uInput;
uniform sampler2D uFeedback;
uniform vec2 uRes;
uniform float uTime, uBass, uMid, uHigh;
uniform float P_warp, P_scale, P_shift, P_sym, P_speed, P_trails, P_glitch;
uniform int uMode, uHasInput, uFlipX;
${FX_BODY}
// patrón de prueba cuando no hay cámara/video activo
vec3 testPattern(vec2 uv, float t){
  vec2 g = uv*vec2(uRes.x/uRes.y,1.0)*10.0;
  float a = step(0.5, fract(g.x*0.5+sin(g.y*0.6+t)))*0.5+0.25;
  vec3 c = 0.5+0.5*cos(vec3(0,2,4)+uv.xyx*4.0+t);
  float bars = smoothstep(0.0,0.02,abs(fract(uv.x*8.0+t*0.3)-0.5));
  return mix(c*a, vec3(0.05), 0.3)*bars + c*0.25;
}
vec3 srcRGB(vec2 uv, float t){
  if(uHasInput==0) return testPattern(uv, t);
  if(uFlipX==1) uv.x = 1.0-uv.x;
  uv = clamp(uv, 0.0, 1.0);
  return texture(uInput, uv).rgb;
}
void main(){
  vec2 uv = gl_FragCoord.xy/uRes;
  vec2 uvc = uv-0.5; uvc.x *= uRes.x/uRes.y;
  float t = uTime*P_speed;
  vec2 duv = distortUV(uv, uvc, t, uMode, uBass, uMid, uHigh);
  float so = (P_shift*(0.4+uHigh*1.6))*0.03;
  vec3 col;
  if(uMode==1){ // RGB SPLIT puro: separa canales sobre la imagen
    col.r = srcRGB(duv+vec2(so,0.0), t).r;
    col.g = srcRGB(duv, t).g;
    col.b = srcRGB(duv-vec2(so,0.0), t).b;
  } else {
    col.r = srcRGB(duv+vec2(so,0.0)*0.4, t).r;
    col.g = srcRGB(duv, t).g;
    col.b = srcRGB(duv-vec2(so,0.0)*0.4, t).b;
  }
  // grano/glitch leve
  col += (hash(gl_FragCoord.xy+uTime)-0.5)*P_glitch*0.25;
  // feedback / trails: muestrea el frame previo con un leve zoom hacia el centro
  vec2 fbuv = (uv-0.5)*(1.0-0.012*(0.3+P_trails)) + 0.5;
  vec3 fb = texture(uFeedback, fbuv).rgb;
  col = mix(col, max(col*0.6, fb*0.992), P_trails);
  fragColor = vec4(clamp(col,0.0,1.0), 1.0);
}`;

const COPY_FRAG = `#version 300 es
precision highp float;
out vec4 o; uniform sampler2D t; uniform vec2 uRes;
void main(){ o = texture(t, gl_FragCoord.xy/uRes); }`;

const VERT = `#version 300 es
void main(){ vec2 p = vec2((gl_VertexID<<1)&2, gl_VertexID&2); gl_Position = vec4(p*2.0-1.0, 0.0, 1.0); }`;

function compile(type, src){
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)+'\n'+src.split('\n').map((l,i)=>(i+1)+': '+l).join('\n'));
  return s;
}
function program(fragSrc){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const fxProg = program(FX_FRAG);
const copyProg = program(COPY_FRAG);

// textura de input (cámara/video)
const inputTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, inputTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0,0,0,255]));

// ping-pong FBOs para el feedback
let fbos = [], texs = [], W=0, H=0;
function makeTarget(w,h){
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fb };
}
function resize(){
  const w = Math.max(2, Math.floor(cv.clientWidth)), h = Math.max(2, Math.floor(cv.clientHeight));
  if(w===W && h===H) return;
  W=w; H=h; cv.width=w; cv.height=h;
  texs.forEach(t=>gl.deleteTexture(t)); fbos.forEach(f=>gl.deleteFramebuffer(f));
  texs=[]; fbos=[];
  for(let i=0;i<2;i++){ const t=makeTarget(w,h); texs.push(t.tex); fbos.push(t.fb); }
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}
window.addEventListener('resize', resize);

// uniformes comunes a fxProg y a los programas de IA — se setean si existen
const COMMON_U = ['uRes','uTime','uBass','uMid','uHigh','uMode','uHasInput','uFlipX','uInput','uFeedback',
 'P_warp','P_scale','P_shift','P_sym','P_speed','P_trails','P_glitch'];
function locsFor(prog){ const o={}; COMMON_U.forEach(n=>o[n]=gl.getUniformLocation(prog,n)); return o; }
const UL = locsFor(fxProg);
let curT=0;
function setUniforms(L){
  if(L.uRes) gl.uniform2f(L.uRes, W, H);
  if(L.uTime) gl.uniform1f(L.uTime, curT);
  if(L.uBass) gl.uniform1f(L.uBass, audio.bass);
  if(L.uMid) gl.uniform1f(L.uMid, audio.mid);
  if(L.uHigh) gl.uniform1f(L.uHigh, audio.high);
  if(L.uMode) gl.uniform1i(L.uMode, (typeof P.mode==='number')?P.mode:0);
  if(L.uHasInput) gl.uniform1i(L.uHasInput, hasInput);
  if(L.uFlipX) gl.uniform1i(L.uFlipX, flipX);
  if(L.P_warp) gl.uniform1f(L.P_warp, P.warp);
  if(L.P_scale) gl.uniform1f(L.P_scale, P.scale);
  if(L.P_shift) gl.uniform1f(L.P_shift, P.shift);
  if(L.P_sym) gl.uniform1f(L.P_sym, P.sym);
  if(L.P_speed) gl.uniform1f(L.P_speed, P.speed);
  if(L.P_trails) gl.uniform1f(L.P_trails, P.trails);
  if(L.P_glitch) gl.uniform1f(L.P_glitch, P.glitch);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, inputTex); if(L.uInput) gl.uniform1i(L.uInput, 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, texs[read]); if(L.uFeedback) gl.uniform1i(L.uFeedback, 1);
}

let read=0, write=1, startT=performance.now();
let aiProg=null, aiLocs=null, aiRawGLSL=null;  // efecto generado por IA (si hay)
function frame(){
  resize();
  // subir frame de video/cámara a la textura
  if(hasInput && vid.readyState>=2){
    gl.bindTexture(gl.TEXTURE_2D, inputTex);
    try{ gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, vid); }catch(e){}
  }
  updateAudio();
  curT = (performance.now()-startT)/1000;

  const useAI = (P.mode==='ai' && aiProg);
  const prog = useAI ? aiProg : fxProg;
  const L = useAI ? aiLocs : UL;

  // pass FX → escribe al FBO write, leyendo el FBO read como feedback
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbos[write]);
  gl.viewport(0,0,W,H);
  gl.useProgram(prog);
  setUniforms(L);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // present → copia el FBO write a pantalla
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0,0,W,H);
  gl.useProgram(copyProg);
  gl.uniform2f(gl.getUniformLocation(copyProg,'uRes'), W, H);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texs[write]); gl.uniform1i(gl.getUniformLocation(copyProg,'t'), 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  read^=1; write^=1;
  requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════════════════════════
// IA — genera un efecto GLSL nuevo desde un prompt (Claude, BYOK).
// La IA escribe SOLO la función aiEffect() usando un set fijo de helpers
// (SAMPLE/FEEDBACK/NOISE/…), así el mismo código corre acá y se traduce a
// Synesthesia. Si no compila, se le manda el error y reintenta (auto-fix).
// ════════════════════════════════════════════════════════════════════
const AI_HELPERS_GLSL = `
float HASH(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float NOISE(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(HASH(i),HASH(i+vec2(1.0,0.0)),u.x),mix(HASH(i+vec2(0.0,1.0)),HASH(i+vec2(1.0,1.0)),u.x),u.y); }
float FBM(vec2 p){ float v=0.0,a=0.55; mat2 m=mat2(1.6,1.2,-1.2,1.6); for(int i=0;i<5;i++){ v+=a*NOISE(p); p=m*p; a*=0.5; } return v; }
vec2 KALEIDO(vec2 p, float f){ if(f<0.5) return p; float a=atan(p.y,p.x),r=length(p),s=3.14159265/f; a=abs(mod(a,2.0*s)-s); return vec2(cos(a),sin(a))*r; }`;

const AI_PREAMBLE = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform sampler2D uInput, uFeedback;
uniform vec2 uRes;
uniform float uTime, uBass, uMid, uHigh, P_trails;
uniform int uHasInput, uFlipX;
#define RES uRes
${AI_HELPERS_GLSL}
vec3 SAMPLE(vec2 uv){
  if(uHasInput==0){ return 0.5+0.5*cos(vec3(0.0,2.0,4.0)+uv.xyx*5.0+uTime); }
  if(uFlipX==1) uv.x = 1.0-uv.x;
  return texture(uInput, clamp(uv,0.0,1.0)).rgb;
}
vec3 FEEDBACK(vec2 uv){ return texture(uFeedback, clamp(uv,0.0,1.0)).rgb; }`;

const AI_MAIN = `
void main(){
  vec2 uv = gl_FragCoord.xy/uRes;
  vec2 uvc = uv-0.5; uvc.x *= uRes.x/uRes.y;
  vec3 c = aiEffect(uv, uvc, uTime, uBass, uMid, uHigh);
  vec2 fbuv = (uv-0.5)*(1.0-0.012*(0.3+P_trails))+0.5;
  c = mix(c, max(c*0.6, FEEDBACK(fbuv)*0.992), P_trails);
  fragColor = vec4(clamp(c,0.0,1.0), 1.0);
}`;

// efecto IA de arranque — sirve de auto-test del harness y de default
const AI_DEFAULT = `vec3 aiEffect(vec2 uv, vec2 uvc, float t, float bass, float mid, float high){
  vec2 d = uv + 0.03*(1.0+bass*2.0)*vec2(NOISE(uvc*5.0+t), NOISE(uvc*5.0-t)-0.5);
  vec3 col = SAMPLE(d);
  col *= 0.7+0.5*sin(length(uvc)*10.0 - t*2.0 + high*6.0);
  return col;
}`;

function compileAIProgram(aiBody){ return program(AI_PREAMBLE + '\n' + aiBody + '\n' + AI_MAIN); }

const AI_SYSTEM = `Sos un programador experto de shaders GLSL para "WARP", un visualizador VJ audio-reactivo.
Tu tarea: escribir UNA función GLSL ES 3.00 que distorsiona/transforma una imagen de entrada (cámara o video) de forma hermosa, compleja y musical.

DEVOLVÉ SOLAMENTE el código GLSL crudo. NADA de markdown, backticks, explicaciones, #version, precision, uniform, ni main(). Solo la función aiEffect (y, si querés, funciones helper TUYAS declaradas ANTES de ella).

Firma EXACTA de la entrada (no la cambies):
vec3 aiEffect(vec2 uv, vec2 uvc, float t, float bass, float mid, float high)
- uv: coordenada 0..1 de pantalla. uvc: centrada y corregida por aspecto (x va de -ar/2..ar/2). t: tiempo en segundos. bass/mid/high: nivel de audio 0..1 (usalos para que el efecto lata con la música).
- Devolvé un vec3 de color en rango [0,1].

HELPERS YA DISPONIBLES (no los redefinas):
- vec3 SAMPLE(vec2 uv)  → lee el pixel de la imagen de entrada (cámara/video) en esa coordenada. Distorsioná la uv antes de pasarla para deformar la imagen.
- vec3 FEEDBACK(vec2 uv) → lee el frame previo (para estelas/trails).
- float NOISE(vec2), float FBM(vec2), float HASH(vec2), vec2 KALEIDO(vec2 p, float folds).
- RES (vec2 resolución).

REGLAS:
- Usá SAMPLE() para que el efecto trabaje sobre la imagen real (no generes todo de cero, salvo que el pedido lo pida).
- Hacelo audio-reactivo con bass/mid/high.
- Bucles acotados (máximo 48 iteraciones) por performance.
- Movimiento suave y continuo con t. Apuntá a algo visualmente rico y elegante.
- Todo lo que devuelvas tiene que compilar como GLSL ES 3.00.`;

function extractGLSL(t){ const m = t.match(/```(?:glsl)?\s*([\s\S]*?)```/i); return (m?m[1]:t).trim(); }
function truncate(s,n){ s=String(s); return s.length>n ? s.slice(0,n)+'…' : s; }

async function callClaude(key, model, messages){
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model, max_tokens:1800, system: AI_SYSTEM, messages })
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error((data.error && data.error.message) || ('HTTP '+r.status));
  return (data.content && data.content[0] && data.content[0].text) || '';
}
async function callGemini(key, model, messages){
  // Gemini usa role 'model' (no 'assistant') y contents/parts. La key va por
  // header x-goog-api-key (NO en la URL).
  const contents = messages.map(m=>({ role: m.role==='assistant'?'model':'user', parts:[{ text:m.content }] }));
  const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-goog-api-key':key },
    body: JSON.stringify({ system_instruction:{ parts:[{ text:AI_SYSTEM }] }, contents, generationConfig:{ maxOutputTokens:4096, temperature:1 } })
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error((data.error && data.error.message) || ('HTTP '+r.status));
  const c = data.candidates && data.candidates[0];
  if(!c || !c.content) throw new Error('Gemini no devolvió contenido' + (c && c.finishReason ? ' (finishReason: '+c.finishReason+')' : ''));
  return (c.content.parts || []).map(p=>p.text||'').join('') || '';
}
const PROVIDERS = {
  gemini: { keyName:'warp_gemini_key',
    keyHint:'tu API key de Google AI Studio (AIza…)',
    note:'Gemini tiene capa GRATUITA. Sacá tu key gratis en aistudio.google.com → "Get API key". Queda solo en este navegador, va directo a Google.',
    models:[['gemini-2.0-flash','Gemini 2.0 Flash — gratis, rápido'],['gemini-2.5-flash','Gemini 2.5 Flash — mejor, gratis']] },
  anthropic: { keyName:'warp_anthropic_key',
    keyHint:'tu API key de Anthropic (sk-ant-…)',
    note:'Anthropic es PAGO (sin capa gratuita). La key queda solo en este navegador y va directo a api.anthropic.com — la pagás vos por uso.',
    models:[['claude-sonnet-4-6','Claude Sonnet 4.6 — rápido'],['claude-opus-4-8','Claude Opus 4.8 — mejor']] }
};
let aiProvider = 'gemini';
function callAI(provider, key, model, messages){ return provider==='gemini' ? callGemini(key, model, messages) : callClaude(key, model, messages); }
function applyProvider(){
  const p = PROVIDERS[aiProvider];
  $('aiKey').placeholder = p.keyHint;
  $('aiKey').value = localStorage.getItem(p.keyName) || '';
  $('aiNote').textContent = p.note;
  $('aiModel').innerHTML = p.models.map(([v,l],i)=>`<option value="${v}"${i===0?' selected':''}>${l}</option>`).join('');
  $('provGem').classList.toggle('on', aiProvider==='gemini');
  $('provAnt').classList.toggle('on', aiProvider==='anthropic');
}

async function generateEffect(){
  const key = $('aiKey').value.trim();
  const prompt = $('aiPrompt').value.trim();
  if(!key){ setAiStatus('Pegá tu API key primero.', true); return; }
  if(!prompt){ setAiStatus('Escribí qué efecto querés.', true); return; }
  localStorage.setItem(PROVIDERS[aiProvider].keyName, key);
  const model = $('aiModel').value;
  $('aiGen').disabled = true;
  const messages = [{ role:'user', content:'Creá un efecto para este pedido: '+prompt }];
  let ok=false, lastErr='';
  for(let attempt=1; attempt<=4; attempt++){
    setAiStatus(attempt===1 ? 'Pensando el shader…' : 'Arreglando errores de compilación (intento '+attempt+'/4)…');
    let text;
    try{ text = await callAI(aiProvider, key, model, messages); }
    catch(e){ setAiStatus('Error de API: '+e.message, true); $('aiGen').disabled=false; return; }
    const glsl = extractGLSL(text);
    try{
      const prog = compileAIProgram(glsl);
      if(aiProg) gl.deleteProgram(aiProg);
      aiProg = prog; aiLocs = locsFor(prog); aiRawGLSL = glsl;
      P.mode = 'ai'; markAIActive();
      setAiStatus('✓ Efecto generado y corriendo en vivo. Exportalo o pedí otro.');
      ok=true; break;
    }catch(e){
      lastErr = e.message;
      messages.push({ role:'assistant', content: text });
      messages.push({ role:'user', content:'Ese shader no compila. Error del compilador GLSL:\n'+truncate(lastErr,1200)+'\nDevolvé SOLO el GLSL corregido (la función aiEffect y sus helpers), sin explicaciones ni markdown.' });
    }
  }
  if(!ok) setAiStatus('No compiló tras 4 intentos. Reformulá el prompt. Último error: '+truncate(lastErr,180), true);
  $('aiGen').disabled = false;
}
function setAiStatus(msg, err){ const el=$('aiStatus'); el.textContent=msg; el.style.color = err ? 'var(--glitch)' : 'var(--cyan)'; }
function markAIActive(){ const b=$('famAI'); if(b){ $('fams').querySelectorAll('.fam').forEach(x=>x.classList.remove('on')); b.classList.add('on'); } }
// traduce el cuerpo aiEffect a una escena de Synesthesia
function aiToSyn(body){
  return `// WARP IA — efecto generado, exportado a Synesthesia.
// Asigná una media (cámara o video) en Synesthesia: el shader la transforma.
#define RES RENDERSIZE
${AI_HELPERS_GLSL}
vec3 SAMPLE(vec2 uv){ return _loadMedia(clamp(uv,0.0,1.0)).rgb; }
vec3 FEEDBACK(vec2 uv){ return texture(warpBuffer, clamp(uv,0.0,1.0)).rgb; }
${body}
vec4 fxPass(){
  vec2 uv=_uv; vec2 uvc=_uvc;
  vec3 c = aiEffect(uv, uvc, syn_Time, syn_BassLevel, syn_MidLevel, syn_HighLevel);
  vec2 fbuv=(_uv-0.5)*(1.0-0.012*(0.3+P_trails))+0.5;
  c = mix(c, max(c*0.6, texture(warpBuffer, clamp(fbuv,0.0,1.0)).rgb*0.992), P_trails);
  return vec4(clamp(c,0.0,1.0),1.0);
}
vec4 renderMain(){ if(PASSINDEX==0.0) return fxPass(); return texture(warpBuffer,_uv); }`;
}

// ════════════════════════════════════════════════════════════════════
// AUDIO — Web Audio (mic o audio del video) → bass/mid/high suavizados
// ════════════════════════════════════════════════════════════════════
let ac=null, analyser=null, freq=null, micStream=null, vidSrcNode=null;
const audio = { bass:0, mid:0, high:0 };
function ensureCtx(){ if(!ac){ ac = new (window.AudioContext||window.webkitAudioContext)(); } if(ac.state==='suspended') ac.resume(); }
function setAnalyser(node){
  if(!analyser){ analyser = ac.createAnalyser(); analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.7; freq = new Uint8Array(analyser.frequencyBinCount); }
  try{ node.connect(analyser); }catch(e){}
}
async function audioMic(){
  ensureCtx();
  try{
    micStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    setAnalyser(ac.createMediaStreamSource(micStream));
    audMode='mic'; setAudBtns(); toast('Mic conectado — el sonido del ambiente maneja la distorsión.');
  }catch(e){ toast('No se pudo abrir el micrófono: '+e.message); }
}
function audioVideo(){
  ensureCtx();
  if(!vidSrcNode){ try{ vidSrcNode = ac.createMediaElementSource(vid); }catch(e){ /* ya creado */ } }
  if(vidSrcNode){ setAnalyser(vidSrcNode); try{ vidSrcNode.connect(ac.destination); }catch(e){} }
  vid.muted = false;
  audMode='vid'; setAudBtns(); toast('Audio del video conectado.');
}
function audioOff(){ audMode='off'; setAudBtns(); }
function updateAudio(){
  if(audMode==='off' || !analyser){
    // pulso suave ambiente para que los modos respiren sin audio
    const t=performance.now()/1000;
    audio.bass = 0.12+0.12*Math.sin(t*1.7); audio.mid = 0.1+0.1*Math.sin(t*2.3+1.0); audio.high = 0.08+0.08*Math.sin(t*3.1+2.0);
    setMeter((audio.bass+audio.mid+audio.high)/1.0);
    return;
  }
  analyser.getByteFrequencyData(freq);
  const n=freq.length, g=P.audgain;
  const band=(a,b)=>{ let s=0; for(let i=a;i<b;i++)s+=freq[i]; return (s/((b-a)*255)); };
  const bass=band(1, Math.floor(n*0.08)), mid=band(Math.floor(n*0.08), Math.floor(n*0.3)), high=band(Math.floor(n*0.3), Math.floor(n*0.8));
  audio.bass = Math.min(1, bass*g*1.4); audio.mid = Math.min(1, mid*g*1.6); audio.high = Math.min(1, high*g*2.2);
  setMeter((audio.bass+audio.mid+audio.high)/2.0);
}
function setMeter(v){ $('audMeter').style.width = Math.min(100, Math.max(0, v*100))+'%'; }
function setAudBtns(){ $('audOff').classList.toggle('on', audMode==='off'); $('audMic').classList.toggle('on', audMode==='mic'); $('audVid').classList.toggle('on', audMode==='vid'); }

// ════════════════════════════════════════════════════════════════════
// FUENTE — cámara / archivo de video
// ════════════════════════════════════════════════════════════════════
async function useCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:1280, height:720 }, audio:false });
    vid.srcObject = stream; vid.muted = true; await vid.play();
    hasInput=1; flipX=1; $('srcCam').classList.add('on'); $('srcVid').classList.remove('on');
    toast('Cámara en vivo.');
  }catch(e){ toast('No se pudo abrir la cámara: '+e.message); }
}
function useVideoFile(file){
  if(vid.srcObject){ vid.srcObject.getTracks().forEach(t=>t.stop()); vid.srcObject=null; }
  vid.src = URL.createObjectURL(file); vid.loop=true; vid.muted = (audMode!=='vid');
  vid.play();
  hasInput=1; flipX=0; $('srcVid').classList.add('on'); $('srcCam').classList.remove('on');
  toast('Video cargado: '+file.name);
}

// ════════════════════════════════════════════════════════════════════
// EXPORT — genera main.glsl + scene.json para una scene .synScene
// El cuerpo de distorsión se traduce a los nombres de Synesthesia.
// ════════════════════════════════════════════════════════════════════
function toSynGLSL(){
  if(P.mode==='ai' && aiRawGLSL) return aiToSyn(aiRawGLSL);
  // Traducción del cuerpo de preview a SSF: P_x → controles, audio → syn_*,
  // input → _loadMedia(), feedback → buffer persistente.
  let body = FX_BODY
    .replace(/uRes/g, 'RENDERSIZE');
  return `// WARP — Human Glitche · escena generada (efecto: ${MODES[P.mode]})
// Asigná una media (cámara o video) en Synesthesia: el shader la distorsiona.
const int FX_MODE = ${P.mode};
${body}

vec3 srcRGB(vec2 uv){
  uv = clamp(uv, 0.0, 1.0);
  return _loadMedia(uv).rgb;
}

vec4 fxPass(){
  vec2 uv = _uv;
  vec2 uvc = _uvc;
  float t = syn_Time*P_speed;
  vec2 duv = distortUV(uv, uvc, t, FX_MODE, syn_BassLevel, syn_MidLevel, syn_HighLevel);
  float so = (P_shift*(0.4+syn_HighLevel*1.6))*0.03;
  vec3 col;
  col.r = srcRGB(duv+vec2(so,0.0)).r;
  col.g = srcRGB(duv).g;
  col.b = srcRGB(duv-vec2(so,0.0)).b;
  col += (_rand(_uv+syn_Time)-0.5)*P_glitch*0.25;
  vec2 fbuv = (_uv-0.5)*(1.0-0.012*(0.3+P_trails))+0.5;
  vec3 fb = texture(warpBuffer, fbuv).rgb;
  col = mix(col, max(col*0.6, fb*0.992), P_trails);
  return vec4(clamp(col,0.0,1.0), 1.0);
}

vec4 renderMain(){
  if(PASSINDEX == 0.0) return fxPass();          // efecto + feedback → warpBuffer
  return texture(warpBuffer, _uv);               // presentación
}`;
}
function toSynJSON(){
  const knob = (name, min, max, def) => ({ NAME:name, TYPE:'knob', MIN:min, MAX:max, DEFAULT:def });
  const isAI = (P.mode==='ai' && aiRawGLSL);
  const label = isAI ? 'IA' : MODES[P.mode];
  const controls = isAI
    ? [ knob('P_trails', 0, 0.98, P.trails) ]
    : [ knob('P_warp', 0, 1.5, P.warp), knob('P_scale', 0.5, 8, P.scale), knob('P_shift', 0, 2, P.shift),
        knob('P_sym', 0, 12, P.sym), knob('P_speed', 0, 2, P.speed), knob('P_trails', 0, 0.98, P.trails), knob('P_glitch', 0, 1, P.glitch) ];
  return JSON.stringify({
    CREDIT: 'Human Glitche · WARP',
    DESCRIPTION: 'Distorsión reactiva de la media de entrada (efecto: '+label+'). Generada en hg-vl.com/labs.',
    CONTROLS: controls,
    PASSES: [
      { TARGET: 'warpBuffer', PERSISTENT: true, FLOAT: true },
      {}
    ]
  }, null, 2);
}
function download(name, text){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type:'text/plain' }));
  a.download = name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function exportScene(){
  download('main.glsl', toSynGLSL());
  setTimeout(()=>download('scene.json', toSynJSON()), 250);
  toast('Bajados main.glsl + scene.json — ponelos juntos en una carpeta "WARP.synScene" en tu librería de Synesthesia.');
}

// ── grabar el canvas a WebM ──
let rec=null, chunks=[];
function toggleRecord(){
  if(rec && rec.state==='recording'){ rec.stop(); return; }
  const stream = cv.captureStream(30);
  chunks=[]; rec = new MediaRecorder(stream, { mimeType:'video/webm' });
  rec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
  rec.onstop = ()=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(chunks,{type:'video/webm'})); a.download='warp.webm'; a.click(); $('recBtn').classList.remove('rec'); $('recBtn').textContent='● GRABAR'; toast('Clip guardado: warp.webm'); };
  rec.start(); $('recBtn').classList.add('rec'); $('recBtn').textContent='■ PARAR'; toast('Grabando…');
}

function buildFams(){
  let html = MODES.map((m,i)=>`<button class="fam${i===P.mode?' on':''}" data-m="${i}">${m}</button>`).join('');
  html += `<button class="fam" id="famAI" data-m="ai" style="grid-column:span 3;border-color:rgba(184,255,0,.45);color:var(--acid)">✨ EFECTO IA</button>`;

}
function syncSliders(){

let toastT=null;
function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'), 3200); }

$('toggle').onclick = ()=> $('panel').classList.toggle('hide');

$('glslBtn').onclick = ()=>{ navigator.clipboard?.writeText(toSynGLSL()).then(()=>toast('GLSL de Synesthesia copiado.'), ()=>toast('No se pudo copiar.')); };
$('aiGen').onclick = generateEffect;
$('provGem').onclick = ()=>{ aiProvider='gemini'; applyProvider(); };
$('provAnt').onclick = ()=>{ aiProvider='anthropic'; applyProvider(); };
$('aiKey').onchange = ()=> localStorage.setItem(PROVIDERS[aiProvider].keyName, $('aiKey').value.trim());
applyProvider();
addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;

// auto-test del harness de IA: compila el efecto default. Si anda, la
// infraestructura de IA (compilar GLSL generado + correrlo) está sana.
try{ aiProg = compileAIProgram(AI_DEFAULT); aiLocs = locsFor(aiProg); aiRawGLSL = AI_DEFAULT; console.log('WARP: AI harness OK'); }
catch(e){ console.warn('WARP: AI harness FAIL —', e.message); }

buildFams(); syncSliders(); setAudBtns(); resize();
requestAnimationFrame(frame);
