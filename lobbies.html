<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALAS HG — HUMAN GLITCHE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#050505;
  --white:#f0ede6;
  --acid:#b8ff00;
  --glitch:#ff2d55;
  --mono:'Space Mono',monospace;
  --display:'Bebas Neue',sans-serif;
  --body:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");z-index:0;pointer-events:none;opacity:0.4;}

#wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 1.5rem 5rem;}

/* NAV */
.lnav{
  display:flex;justify-content:space-between;align-items:center;
  padding:1.8rem 0 2.4rem;margin-bottom:0.5rem;
}
.lnav-back{
  font-family:var(--mono);font-size:9px;letter-spacing:0.18em;color:rgba(240,237,230,0.4);
  text-decoration:none;transition:color 0.2s;
}
.lnav-back:hover{color:var(--acid);}
.lnav-title{font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:rgba(240,237,230,0.25);text-transform:uppercase;}

/* PAGE HEADER */
#page-header{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:2.4rem;flex-wrap:wrap;gap:1rem;
}
#page-title-wrap{}
#page-title{font-family:var(--display);font-size:clamp(2.8rem,7vw,5rem);letter-spacing:0.04em;line-height:1;color:var(--white);}
#page-sub{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;color:rgba(240,237,230,0.3);margin-top:0.5rem;text-transform:uppercase;}

#create-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  background:var(--acid);color:#050505;border:none;border-radius:2px;
  padding:11px 22px;cursor:pointer;font-weight:700;transition:opacity 0.2s;
  white-space:nowrap;
}
#create-btn:hover{opacity:0.85;}
#create-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* FILTER BAR */
#filter-bar{
  display:flex;gap:0;margin-bottom:2rem;
  border-bottom:1px solid rgba(240,237,230,0.08);
  overflow-x:auto;scrollbar-width:none;
}
#filter-bar::-webkit-scrollbar{display:none;}
.filt-btn{
  font-family:var(--mono);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.6rem 1.1rem;border:none;background:none;cursor:pointer;
  color:rgba(240,237,230,0.3);border-bottom:2px solid transparent;
  white-space:nowrap;transition:all 0.15s;margin-bottom:-1px;
}
.filt-btn:hover{color:rgba(240,237,230,0.7);}
.filt-btn.active{color:var(--acid);border-bottom-color:var(--acid);}

/* LOBBY GRID */
#lobby-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));
  gap:1rem;
}
#grid-empty{
  grid-column:1/-1;
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  color:rgba(240,237,230,0.2);text-align:center;padding:4rem 0;
}
#grid-loading{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--mono);font-size:9px;letter-spacing:0.22em;
  color:rgba(240,237,230,0.3);padding:4rem 0;
}
.led-spin{width:6px;height:6px;border-radius:50%;background:var(--acid);animation:pulse-led 1.4s ease-in-out infinite;}
@keyframes pulse-led{0%,100%{opacity:0.25;}50%{opacity:1;}}

/* LOBBY CARD */
.lobby-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(240,237,230,0.08);
  border-radius:4px;padding:1.4rem;
  display:flex;flex-direction:column;gap:0.75rem;
  transition:border-color 0.2s,background 0.2s;
}
.lobby-card:hover{
  border-color:rgba(184,255,0,0.2);
  background:rgba(184,255,0,0.02);
}
.lobby-card.launched{
  border-color:rgba(255,45,85,0.25);
  background:rgba(255,45,85,0.03);
}
.lobby-card.launched:hover{
  border-color:rgba(255,45,85,0.4);
  background:rgba(255,45,85,0.05);
}

.card-top{display:flex;justify-content:space-between;align-items:center;gap:0.5rem;}

.type-tag{
  font-family:var(--mono);font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;border:1px solid transparent;
  display:inline-block;
}
.type-tag.PROYECTO{color:#b8ff00;border-color:rgba(184,255,0,0.3);background:rgba(184,255,0,0.07);}
.type-tag.COLLAB{color:#00d4ff;border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.07);}
.type-tag.JAM{color:#ff6b00;border-color:rgba(255,107,0,0.3);background:rgba(255,107,0,0.07);}
.type-tag.BRAINSTORM{color:#9b59ff;border-color:rgba(155,89,255,0.3);background:rgba(155,89,255,0.07);}
.type-tag.PRODUCCIÓN{color:#ff2d8a;border-color:rgba(255,45,138,0.3);background:rgba(255,45,138,0.07);}

.launched-badge{
  font-family:var(--mono);font-size:7px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--glitch);display:inline-flex;align-items:center;gap:4px;
}
.launched-dot{width:5px;height:5px;border-radius:50%;background:var(--glitch);animation:pulse-led 1.4s ease-in-out infinite;}

.cap-label{
  font-family:var(--mono);font-size:8px;letter-spacing:0.1em;
  color:rgba(240,237,230,0.4);white-space:nowrap;
}

.card-title{
  font-family:var(--display);font-size:1.5rem;letter-spacing:0.03em;
  line-height:1.05;color:var(--white);
}

.card-desc{
  font-family:var(--body);font-size:11px;line-height:1.6;
  color:rgba(240,237,230,0.45);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* META CHIPS (campos ricos en la card) */
.card-meta{display:flex;flex-wrap:wrap;gap:5px;}
.meta-chip{
  font-family:var(--mono);font-size:7px;letter-spacing:0.08em;
  color:rgba(240,237,230,0.5);border:1px solid rgba(240,237,230,0.12);
  border-radius:20px;padding:2px 7px;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;
}
.meta-chip .mk{color:rgba(240,237,230,0.3);}

.cap-bar{display:flex;gap:3px;align-items:center;}
.cap-sq{width:10px;height:10px;border-radius:1px;flex-shrink:0;}
.cap-sq.filled{opacity:1;}
.cap-sq.empty{opacity:0.18;}

.members-line{
  font-family:var(--mono);font-size:8px;letter-spacing:0.06em;
  color:rgba(240,237,230,0.3);line-height:1.5;min-height:12px;
}

.card-actions{display:flex;gap:8px;align-items:center;margin-top:0.25rem;flex-wrap:wrap;}

.you-pill{
  font-family:var(--mono);font-size:7px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--acid);border:1px solid rgba(184,255,0,0.3);border-radius:20px;
  padding:3px 8px;background:rgba(184,255,0,0.06);white-space:nowrap;
}

.card-btn{
  font-family:var(--mono);font-size:8px;letter-spacing:0.16em;text-transform:uppercase;
  border:1px solid rgba(240,237,230,0.18);border-radius:2px;background:transparent;
  color:rgba(240,237,230,0.6);padding:8px 14px;cursor:pointer;transition:all 0.2s;
  white-space:nowrap;text-decoration:none;display:inline-block;
}
.card-btn:hover{border-color:var(--acid);color:var(--acid);background:rgba(184,255,0,0.05);}
.card-btn.primary{
  border-color:rgba(184,255,0,0.4);color:var(--acid);background:rgba(184,255,0,0.06);
}
.card-btn.primary:hover{background:rgba(184,255,0,0.14);border-color:var(--acid);}
.card-btn.danger:hover{border-color:var(--glitch);color:var(--glitch);background:rgba(255,45,85,0.05);}
.card-btn.discord{
  border-color:rgba(88,101,242,0.4);color:#8891f2;background:rgba(88,101,242,0.07);
}
.card-btn.discord:hover{border-color:#8891f2;background:rgba(88,101,242,0.14);}
.card-btn:disabled{opacity:0.35;cursor:wait;}
.card-btn.dimmed{opacity:0.4;cursor:default;border-color:rgba(240,237,230,0.1);color:rgba(240,237,230,0.3);}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:900;
  background:rgba(5,5,5,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:1.5rem;
}
#modal-overlay.show{display:flex;}
#modal-panel{
  background:#0c0c0c;border:1px solid rgba(240,237,230,0.12);border-radius:4px;
  padding:2rem 1.8rem;width:100%;max-width:520px;position:relative;
  max-height:90vh;overflow-y:auto;
}
#modal-panel::-webkit-scrollbar{width:3px;}
#modal-panel::-webkit-scrollbar-thumb{background:rgba(184,255,0,0.15);}
#modal-close{
  position:absolute;top:1rem;right:1rem;
  font-family:var(--mono);font-size:9px;color:rgba(240,237,230,0.3);
  background:none;border:none;cursor:pointer;transition:color 0.2s;padding:4px;
}
#modal-close:hover{color:var(--glitch);}
#modal-title{
  font-family:var(--display);font-size:1.8rem;letter-spacing:0.05em;
  color:var(--white);margin-bottom:1.4rem;
}
#lobby-form{display:flex;flex-direction:column;gap:0.7rem;}
.form-field{display:flex;flex-direction:column;gap:0.35rem;}
.form-row{display:flex;gap:0.7rem;}
.form-row .form-field{flex:1;min-width:0;}
.form-label{
  font-family:var(--mono);font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(240,237,230,0.4);
}
.form-label .opt{color:rgba(240,237,230,0.25);letter-spacing:0.1em;}
.form-field input,.form-field select,.form-field textarea{
  font-family:var(--mono);font-size:9.5px;letter-spacing:0.04em;color:var(--white);
  background:rgba(255,255,255,0.03);border:1px solid rgba(240,237,230,0.15);border-radius:2px;
  padding:9px 10px;outline:none;transition:border-color 0.2s;width:100%;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--acid);}
.form-field input.invalid{border-color:var(--glitch);}
.form-field textarea{resize:vertical;min-height:60px;font-family:var(--body);font-size:11px;}
.form-field select option{background:#111;}
.field-hint{font-family:var(--mono);font-size:7px;letter-spacing:0.06em;color:rgba(240,237,230,0.25);}
#form-submit{
  margin-top:0.5rem;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  background:var(--acid);color:#050505;border:none;border-radius:2px;font-weight:700;
  padding:12px 22px;cursor:pointer;transition:opacity 0.2s;
}
#form-submit:hover{opacity:0.85;}
#form-submit:disabled{opacity:0.4;cursor:wait;}
#form-status{
  font-family:var(--mono);font-size:8px;letter-spacing:0.08em;
  color:rgba(240,237,230,0.4);text-align:center;min-height:14px;
}
#form-status.err{color:var(--glitch);}
#form-status.ok{color:var(--acid);}

/* SALA DE ESPERA */
#room-overlay{
  display:none;position:fixed;inset:0;z-index:910;
  background:rgba(5,5,5,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:1.5rem;
}
#room-overlay.show{display:flex;}
#room-panel{
  background:#0c0c0c;border:1px solid rgba(184,255,0,0.25);border-radius:4px;
  padding:2rem 1.8rem;width:100%;max-width:520px;position:relative;
  max-height:92vh;overflow-y:auto;text-align:center;
}
#room-panel::-webkit-scrollbar{width:3px;}
#room-panel::-webkit-scrollbar-thumb{background:rgba(184,255,0,0.15);}
#room-close{
  position:absolute;top:1rem;right:1rem;
  font-family:var(--mono);font-size:9px;color:rgba(240,237,230,0.3);
  background:none;border:none;cursor:pointer;transition:color 0.2s;padding:4px;
}
#room-close:hover{color:var(--glitch);}
#room-type{margin-bottom:0.8rem;}
#room-title{font-family:var(--display);font-size:2rem;letter-spacing:0.04em;color:var(--white);margin-bottom:0.5rem;}
#room-desc{font-family:var(--body);font-size:11px;line-height:1.6;color:rgba(240,237,230,0.45);margin-bottom:1rem;}

/* META completa en la sala */
#room-meta{
  display:flex;flex-direction:column;gap:6px;text-align:left;
  margin-bottom:1.4rem;
}
#room-meta:empty{display:none;}
.room-meta-row{
  display:flex;gap:8px;align-items:baseline;
  font-family:var(--mono);font-size:8px;letter-spacing:0.04em;
  color:rgba(240,237,230,0.55);line-height:1.5;
}
.room-meta-row .rk{
  color:rgba(240,237,230,0.3);text-transform:uppercase;letter-spacing:0.14em;
  flex-shrink:0;min-width:64px;
}
.room-meta-row a{color:var(--acid);text-decoration:none;word-break:break-all;}
.room-meta-row a:hover{text-decoration:underline;}

#room-slots{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(64px,1fr));
  gap:10px;margin-bottom:1.4rem;
}
.room-slot{
  aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;padding:6px;
  border:1px solid rgba(240,237,230,0.1);background:rgba(255,255,255,0.02);
}
.room-slot.filled{border-color:rgba(184,255,0,0.3);background:rgba(184,255,0,0.05);}
.room-slot.empty{border-style:dashed;border-color:rgba(240,237,230,0.12);}
.room-slot-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:13px;
  background:rgba(184,255,0,0.12);color:var(--acid);
}
.room-slot.empty .room-slot-avatar{
  background:rgba(255,255,255,0.03);color:rgba(240,237,230,0.2);
  animation:pulse-led 1.8s ease-in-out infinite;
}
.room-slot-name{
  font-family:var(--mono);font-size:7px;letter-spacing:0.05em;
  color:rgba(240,237,230,0.5);max-width:90%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.room-slot.empty .room-slot-name{color:rgba(240,237,230,0.15);}

#room-status{
  font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(240,237,230,0.4);margin-bottom:1.4rem;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
#room-status.launched{color:var(--acid);}

/* CHAT IN-APP */
#room-chat{
  margin-bottom:1.4rem;text-align:left;
  border:1px solid rgba(240,237,230,0.08);border-radius:4px;
  background:rgba(255,255,255,0.015);overflow:hidden;
}
.chat-head{
  font-family:var(--mono);font-size:7.5px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(240,237,230,0.35);padding:8px 12px;
  border-bottom:1px solid rgba(240,237,230,0.07);
  display:flex;align-items:center;gap:6px;
}
.chat-head .led-spin{width:5px;height:5px;}
#chat-log{
  max-height:200px;overflow-y:auto;padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
}
#chat-log::-webkit-scrollbar{width:3px;}
#chat-log::-webkit-scrollbar-thumb{background:rgba(184,255,0,0.15);}
.chat-empty{
  font-family:var(--mono);font-size:8px;letter-spacing:0.08em;
  color:rgba(240,237,230,0.2);text-align:center;padding:1rem 0;
}
.chat-msg{display:flex;flex-direction:column;gap:2px;}
.chat-msg-head{
  display:flex;align-items:baseline;gap:6px;
  font-family:var(--mono);font-size:7.5px;letter-spacing:0.05em;
}
.chat-msg-name{color:var(--acid);}
.chat-msg.mine .chat-msg-name{color:#00d4ff;}
.chat-msg-time{color:rgba(240,237,230,0.22);font-size:7px;}
.chat-msg-text{
  font-family:var(--body);font-size:11px;line-height:1.5;
  color:rgba(240,237,230,0.8);word-break:break-word;white-space:pre-wrap;
}
#chat-compose{
  display:flex;gap:6px;padding:10px 12px;
  border-top:1px solid rgba(240,237,230,0.07);
}
#chat-input{
  flex:1;min-width:0;font-family:var(--body);font-size:11px;color:var(--white);
  background:rgba(255,255,255,0.03);border:1px solid rgba(240,237,230,0.15);border-radius:2px;
  padding:8px 10px;outline:none;transition:border-color 0.2s;
}
#chat-input:focus{border-color:var(--acid);}
#chat-input:disabled{opacity:0.5;}
#chat-send{
  font-family:var(--mono);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;
  background:var(--acid);color:#050505;border:none;border-radius:2px;font-weight:700;
  padding:0 14px;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;
}
#chat-send:hover{opacity:0.85;}
#chat-send:disabled{opacity:0.35;cursor:not-allowed;}
.chat-note{
  font-family:var(--mono);font-size:7px;letter-spacing:0.06em;
  color:rgba(240,237,230,0.25);padding:8px 12px;border-top:1px solid rgba(240,237,230,0.07);
  text-align:center;
}

#room-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* FOOTER */
#footer{
  margin-top:4rem;padding-top:2rem;
  border-top:1px solid rgba(240,237,230,0.07);
  font-family:var(--mono);font-size:8px;letter-spacing:0.12em;
  color:rgba(240,237,230,0.12);text-align:center;
}
</style>
</head>
<body>
<script src="/gate/gate.js"></script>

<div id="wrap">

  <nav class="lnav">
    <a class="lnav-back" href="home.html">← HUMAN GLITCHE</a>
    <span class="lnav-title">SALAS HG</span>
    <a class="lnav-back" href="/vl/" style="margin-left:auto;">VISUAL LAB →</a>
  </nav>

  <div id="page-header">
    <div id="page-title-wrap">
      <div id="page-title">SALAS HG</div>
      <div id="page-sub">Encontrá tu sala. Lanzá un proyecto.</div>
    </div>
    <button id="create-btn" disabled>CREAR SALA</button>
  </div>

  <div id="filter-bar">
    <button class="filt-btn active" data-filter="TODAS">TODAS</button>
    <button class="filt-btn" data-filter="PROYECTO">PROYECTO</button>
    <button class="filt-btn" data-filter="COLLAB">COLLAB</button>
    <button class="filt-btn" data-filter="JAM">JAM</button>
    <button class="filt-btn" data-filter="BRAINSTORM">BRAINSTORM</button>
    <button class="filt-btn" data-filter="PRODUCCIÓN">PRODUCCIÓN</button>
  </div>

  <div id="lobby-grid">
    <div id="grid-loading"><span class="led-spin"></span> CARGANDO SALAS…</div>
  </div>

</div>

<!-- MODAL CREAR SALA -->
<div id="modal-overlay">
  <div id="modal-panel">
    <button id="modal-close">✕</button>
    <div id="modal-title">CREAR SALA</div>
    <form id="lobby-form">
      <div class="form-field">
        <label class="form-label" for="f-title">Título</label>
        <input type="text" id="f-title" placeholder="Nombre del proyecto o sala" maxlength="60" required>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-type">Tipo</label>
          <select id="f-type" required>
            <option value="PROYECTO">PROYECTO</option>
            <option value="COLLAB">COLLAB</option>
            <option value="JAM">JAM</option>
            <option value="BRAINSTORM">BRAINSTORM</option>
            <option value="PRODUCCIÓN">PRODUCCIÓN</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-cap">Capacidad</label>
          <select id="f-cap">

<script>
// ════════════════════════════════════════════════════════════════════════
// REGLAS DE FIREBASE NECESARIAS — esta página y el bloque granular se publican
// JUNTOS. El bloque actual del sitio es permisivo:
//   "lobbies": { ".read": true, "$lid": { ".write": "auth != null" } }
// El rework necesita el bloque granular de lobbies.rules.json (create+validate,
// dueño/admin edita-borra, self-join/leave, chat solo miembros, GC de expiradas).
// Hasta que se publiquen las reglas nuevas, la página DEGRADA con gracia:
//   · el grid se ve igual; el GC oportunista es best-effort (si la regla niega
//     el DELETE no rompe nada);
//   · crear/unirse/chatear siguen funcionando con la regla permisiva.
// Config webhook (admin lo setea en Firebase console):
//   /config/discordLobbyWebhook = "https://discord.com/api/webhooks/..."
// ════════════════════════════════════════════════════════════════════════

(function(){
  const FB_URL     = 'https://hg-vl-shaders-default-rtdb.firebaseio.com';
  const FB_API_KEY = 'AIzaSyAeMKHe7dj4bnaUzkF7iDANrC_cBtg4LAA';
  const REFRESH_URL = 'https://securetoken.googleapis.com/v1/token';
  const LS_KEY     = 'hg_auth_session';
  const DISCORD_INVITE = 'https://discord.gg/CgmxdSecHY';

  // ── Ciclo de vida (timestamps en ms) ──────────────────────────────────
  const H = 60 * 60 * 1000;
  const D = 24 * H;
  const EXP_EMPTY  = 24 * H;   // (a) sin miembros y creada hace >24h
  const EXP_ANY    = 7  * D;   // (b) cualquiera creada hace >7 días
  const EXP_LAUNCH = 48 * H;   // (c) launched hace >48h

  const TYPE_COLORS = {
    'PROYECTO':  '#b8ff00',
    'COLLAB':    '#00d4ff',
    'JAM':       '#ff6b00',
    'BRAINSTORM':'#9b59ff',
    'PRODUCCIÓN':'#ff2d8a'
  };
  const VALID_TYPES = Object.keys(TYPE_COLORS);

  let session = null;
  let allLobbies = [];
  let activeFilter = 'TODAS';
  let gcDone = false; // GC oportunista una vez por carga de página

  const grid       = document.getElementById('lobby-grid');
  const createBtn  = document.getElementById('create-btn');
  const modalOv    = document.getElementById('modal-overlay');
  const modalClose = document.getElementById('modal-close');
  const lobbyForm  = document.getElementById('lobby-form');
  const formSubmit = document.getElementById('form-submit');
  const formStatus = document.getElementById('form-status');
  const filterBar  = document.getElementById('filter-bar');

  const roomOv     = document.getElementById('room-overlay');
  const roomClose  = document.getElementById('room-close');
  const roomType   = document.getElementById('room-type');
  const roomTitleEl= document.getElementById('room-title');
  const roomDescEl = document.getElementById('room-desc');
  const roomMeta   = document.getElementById('room-meta');
  const roomSlots  = document.getElementById('room-slots');
  const roomStatus = document.getElementById('room-status');
  const roomActions= document.getElementById('room-actions');
  const chatLog    = document.getElementById('chat-log');
  const chatInput  = document.getElementById('chat-input');
  const chatSend   = document.getElementById('chat-send');
  const chatNote   = document.getElementById('chat-note');
  let roomLobbyId  = null;
  let roomPollTimer = null;
  let lastChatSig  = null; // para evitar re-render/auto-scroll innecesario

  function getSession(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){ return null; } }
  function saveSession(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }

  async function freshToken(s){
    if(!s || !s.refreshToken) return s ? s.idToken : null;
    try{
      const r = await fetch(`${REFRESH_URL}?key=${FB_API_KEY}`,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:`grant_type=refresh_token&refresh_token=${encodeURIComponent(s.refreshToken)}`
      });
      if(!r.ok) return s.idToken;
      const data = await r.json();
      s.idToken = data.id_token;
      s.refreshToken = data.refresh_token;
      saveSession(s);
      return s.idToken;
    }catch(e){ return s.idToken; }
  }

  function setFormStatus(msg, type){
    formStatus.textContent = msg || '';
    formStatus.classList.remove('err','ok');
    if(type) formStatus.classList.add(type);
  }

  // ── FRENTE 1 — CICLO DE VIDA ───────────────────────────────────────────
  function memberCount(lobby){
    return Object.keys(lobby.members || {}).length;
  }

  // "última señal de vida" de la sala: el mayor entre lastActivity y createdAt.
  function lastSignal(lobby){
    return Math.max(lobby.lastActivity || 0, lobby.createdAt || 0);
  }

  // Una sala está EXPIRADA si:
  //  (a) está vacía y se creó hace >24h
  //  (b) se creó hace >7 días (sin importar nada)
  //  (c) está lanzada y la última señal fue hace >48h
  function isExpired(lobby){
    const now = Date.now();
    const created = lobby.createdAt || 0;
    if(!created) return false; // sin createdAt: no la tocamos (dato incompleto)
    const age = now - created;
    if(age > EXP_ANY) return true;                                  // (b)
    if(memberCount(lobby) === 0 && age > EXP_EMPTY) return true;    // (a)
    if(lobby.status === 'launched' && (now - lastSignal(lobby)) > EXP_LAUNCH) return true; // (c)
    return false;
  }

  // GC oportunista: cuando entra un usuario AUTENTICADO, intenta borrar las
  // salas expiradas que ve. Best-effort y silencioso: si la regla lo niega
  // (DELETE de sala ajena), no rompe nada.
  async function gcExpired(expired){
    if(!session || gcDone || !expired.length) return;
    gcDone = true;
    let token = null;
    try{ token = await freshToken(session); }catch(e){ token = null; }
    if(!token) return;
    for(const lobby of expired){
      try{
        await fetch(`${FB_URL}/lobbies/${lobby.id}.json?auth=${token}`, { method:'DELETE' });
      }catch(e){ /* silencioso: la regla puede negar el borrado de salas ajenas */ }
    }
  }

  async function loadLobbies(){
    try{
      const r = await fetch(`${FB_URL}/lobbies.json?orderBy="createdAt"&limitToLast=60`);
      const data = r.ok ? await r.json() : null;
      if(!data){ allLobbies = []; renderLobbies(); return; }
      const parsed = Object.entries(data)
        .map(([id, lobby]) => ({ id, ...lobby }))
        .filter(l => l && l.title);

      // separar vivas de expiradas
      const expired = parsed.filter(isExpired);
      allLobbies = parsed
        .filter(l => !isExpired(l))
        .sort((a,b) => lastSignal(b) - lastSignal(a)); // orden por actividad

      renderLobbies();
      // GC oportunista (una vez): limpia las salas muertas cuando entra un logueado
      gcExpired(expired);
    }catch(e){
      allLobbies = [];
      renderLobbies();
    }
  }

  // marca actividad en la sala (al unirse/salir/chatear) — best-effort
  async function touchActivity(id, token){
    try{
      const t = token || await freshToken(session);
      await fetch(`${FB_URL}/lobbies/${id}/lastActivity.json?auth=${t}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(Date.now())
      });
    }catch(e){ /* silencioso */ }
  }

  function memberNames(lobby){
    const m = lobby.members || {};
    const names = Object.values(m).map(v => v && v.name ? v.name : '—').filter(Boolean);
    return names.join(' — ');
  }

  function capBarHTML(count, cap, type){
    const color = TYPE_COLORS[type] || 'var(--acid)';
    let html = '<div class="cap-bar">';
    for(let i = 0; i < cap; i++){
      const cls = i < count ? 'filled' : 'empty';
      html += `<div class="cap-sq ${cls}" style="background:${color};"></div>`;
    }
    html += '</div>';
    return html;
  }

  function renderLobbies(){
    const toShow = activeFilter === 'TODAS'
      ? allLobbies
      : allLobbies.filter(l => l.type === activeFilter);

    grid.innerHTML = '';

    if(!toShow.length){
      grid.innerHTML = `<div id="grid-empty">No hay salas${activeFilter !== 'TODAS' ? ' de tipo ' + activeFilter : ''} en este momento — ¿creás la primera?</div>`;
      return;
    }

    toShow.forEach(lobby => {
      grid.appendChild(buildCard(lobby));
    });
  }

  // chips compactos de los campos ricos para la card
  function cardMetaHTML(lobby){
    const chips = [];
    if(lobby.roles) chips.push(`<span class="meta-chip"><span class="mk">BUSCA</span> ${escHtml(trunc(lobby.roles,40))}</span>`);
    if(lobby.tool)  chips.push(`<span class="meta-chip"><span class="mk">⚙</span> ${escHtml(lobby.tool)}</span>`);
    if(lobby.startAt) chips.push(`<span class="meta-chip"><span class="mk">⏱</span> ${escHtml(trunc(lobby.startAt,24))}</span>`);
    if(!chips.length) return '';
    return `<div class="card-meta">${chips.join('')}</div>`;
  }

  function trunc(s, n){ s = String(s||''); return s.length > n ? s.slice(0,n) + '…' : s; }

  function buildCard(lobby){
    const uid      = session ? session.uid : null;
    const count    = memberCount(lobby);
    const cap      = parseInt(lobby.capacity) || 4;
    const isIn     = uid && lobby.members && lobby.members[uid];
    const isOwner  = uid && lobby.createdBy === uid;
    const launched = lobby.status === 'launched';
    const type     = lobby.type || 'PROYECTO';
    const color    = TYPE_COLORS[type] || 'var(--acid)';
    const desc     = lobby.desc ? (lobby.desc.length > 120 ? lobby.desc.slice(0,120) + '…' : lobby.desc) : '';

    const card = document.createElement('div');
    card.className = 'lobby-card' + (launched ? ' launched' : '');
    card.dataset.id = lobby.id;

    let topRight = '';
    if(launched){
      topRight = `<span class="launched-badge"><span class="launched-dot"></span> LANZADA</span>`;
    } else {
      topRight = `<span class="cap-label" style="color:${color};">${count} / ${cap}</span>`;
    }

    let actionsHTML = '';
    if(!uid){
      actionsHTML = `<a class="card-btn" href="home.html#comunidad">INICIÁ SESIÓN</a>`;
    } else if(launched){
      actionsHTML = `<a class="card-btn discord" href="${DISCORD_INVITE}" target="_blank" rel="noopener">→ DISCORD</a>`;
    } else {
      if(isIn){
        actionsHTML = `<span class="you-pill">YA ESTÁS AQUÍ</span><button class="card-btn dimmed" data-action="leave" data-id="${lobby.id}">SALIR</button>`;
      } else {
        actionsHTML = `<button class="card-btn primary" data-action="join" data-id="${lobby.id}">UNIRSE A LA SALA</button>`;
      }
    }

    if(isOwner && !launched){
      actionsHTML += `<button class="card-btn danger" data-action="close" data-id="${lobby.id}">✕ CERRAR SALA</button>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <span class="type-tag ${type}">${type}</span>
        ${topRight}
      </div>
      <div class="card-title">${escHtml(lobby.title)}</div>
      ${desc ? `<div class="card-desc">${escHtml(desc)}</div>` : ''}
      ${cardMetaHTML(lobby)}
      ${capBarHTML(count, cap, type)}
      <div class="members-line">${escHtml(memberNames(lobby)) || '—'}</div>
      <div class="card-actions">${actionsHTML}</div>
    `;

    card.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if(!btn){
        openRoom(lobby.id);
        return;
      }
      if(btn.disabled) return;
      const action = btn.dataset.action;
      const id     = btn.dataset.id;
      btn.disabled = true;
      if(action === 'join'){ await joinLobby(id, lobby); openRoom(id); }
      if(action === 'leave') await leaveLobby(id, btn);
      if(action === 'close') await closeLobby(id, btn);
      await loadLobbies();
    });

    return card;
  }

  async function joinLobby(id, lobby){
    if(!session) return;
    try{
      const token = await freshToken(session);
      await fetch(`${FB_URL}/lobbies/${id}/members/${session.uid}.json?auth=${token}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ name: session.name || session.email, joinedAt: Date.now() })
      });
      touchActivity(id, token); // ciclo de vida: la sala sigue viva
      const rFresh = await fetch(`${FB_URL}/lobbies/${id}.json`);
      if(rFresh.ok){
        const fresh = await rFresh.json();
        const count = memberCount(fresh);
        if(count >= parseInt(fresh.capacity)){
          await launchLobby(id, fresh);
        }
      }
    }catch(e){ /* silencioso */ }
  }

  async function leaveLobby(id){
    if(!session) return;
    try{
      const token = await freshToken(session);
      await fetch(`${FB_URL}/lobbies/${id}/members/${session.uid}.json?auth=${token}`,{
        method:'DELETE'
      });
      touchActivity(id, token);
    }catch(e){ /* silencioso */ }
  }

  async function closeLobby(id){
    if(!session) return;
    if(!confirm('¿Cerrás la sala? Esta acción no se puede deshacer.')) return;
    try{
      const token = await freshToken(session);
      await fetch(`${FB_URL}/lobbies/${id}.json?auth=${token}`,{
        method:'DELETE'
      });
    }catch(e){ /* silencioso */ }
  }

  async function launchLobby(id, lobby){
    if(!session) return;
    try{
      const token = await freshToken(session);
      await fetch(`${FB_URL}/lobbies/${id}.json?auth=${token}`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ status:'launched', lastActivity: Date.now() })
      });
      try{
        const wR = await fetch(`${FB_URL}/config/discordLobbyWebhook.json?auth=${token}`);
        const webhookUrl = wR.ok ? await wR.json() : null;
        if(webhookUrl && typeof webhookUrl === 'string'){
          const names = Object.values(lobby.members || {})
            .map(m => m && m.name ? m.name : '?').join(', ');
          await fetch(webhookUrl,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              embeds:[{
                title:`🎮 SALA LANZADA — ${lobby.type || ''}`,
                description:`**${lobby.title}**\n${lobby.desc || ''}\n\n👥 ${names}`,
                color:0xb8ff00,
                footer:{ text:'SALAS HG — Human Glitche Visual Lab' }
              }]
            })
          });
        }
      }catch(e){ /* webhook no disponible */ }
    }catch(e){ /* silencioso */ }
  }

  async function createLobby(data){
    if(!session) return { ok:false, error:'No hay sesión activa.' };
    try{
      const token = await freshToken(session);
      const now = Date.now();
      const payload = {
        title:      data.title,
        type:       data.type,
        desc:       data.desc,
        capacity:   data.capacity,
        status:     'waiting',
        members:    {},
        createdAt:  now,
        lastActivity: now,
        createdBy:  session.uid,
        createdByName: session.name || session.email
      };
      // campos ricos opcionales: solo se mandan si tienen valor
      if(data.roles)   payload.roles   = data.roles;
      if(data.tool)    payload.tool    = data.tool;
      if(data.startAt) payload.startAt = data.startAt;
      if(data.refLink) payload.refLink = data.refLink;

      const r = await fetch(`${FB_URL}/lobbies.json?auth=${token}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(!r.ok){
        const errBody = await r.text().catch(()=>'');
        if(r.status === 401 || r.status === 403){
          return { ok:false, error:`Sin permiso para crear salas (HTTP ${r.status}) — falta la regla de Firebase para /lobbies.` };
        }
        return { ok:false, error:`HTTP ${r.status}${errBody ? ' — ' + errBody.slice(0,150) : ''}` };
      }
      const result = await r.json();
      return { ok:true, id: result.name };
    }catch(e){ return { ok:false, error:`Error de red — ${e.message}` }; }
  }

  function escHtml(s){
    if(s === 0) return '0';
    if(!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // valida http(s) en cliente; devuelve '' si no es válido
  function sanitizeUrl(u){
    u = String(u||'').trim();
    if(!u) return '';
    if(!/^https?:\/\/.+/i.test(u)) return null; // null = inválido (≠ vacío)
    return u;
  }

  function openModal(){
    modalOv.classList.add('show');
    lobbyForm.reset();
    setFormStatus('');
  }
  function closeModal(){
    modalOv.classList.remove('show');
  }

  createBtn.addEventListener('click', () => { if(session) openModal(); });
  modalClose.addEventListener('click', closeModal);
  modalOv.addEventListener('click', e => { if(e.target === modalOv) closeModal(); });

  // ── SALA DE ESPERA ────────────────────────
  async function fetchLobby(id){
    try{
      const r = await fetch(`${FB_URL}/lobbies/${id}.json`);
      return r.ok ? await r.json() : null;
    }catch(e){ return null; }
  }

  // meta completa de la sala (campos ricos) en el overlay
  function roomMetaHTML(lobby){
    const rows = [];
    if(lobby.roles)   rows.push(`<div class="room-meta-row"><span class="rk">Busca</span><span>${escHtml(lobby.roles)}</span></div>`);
    if(lobby.tool)    rows.push(`<div class="room-meta-row"><span class="rk">Herram.</span><span>${escHtml(lobby.tool)}</span></div>`);
    if(lobby.startAt) rows.push(`<div class="room-meta-row"><span class="rk">Arranque</span><span>${escHtml(lobby.startAt)}</span></div>`);
    if(lobby.refLink){
      const safe = sanitizeUrl(lobby.refLink);
      if(safe) rows.push(`<div class="room-meta-row"><span class="rk">Ref</span><a href="${escHtml(safe)}" target="_blank" rel="noopener nofollow">${escHtml(lobby.refLink)}</a></div>`);
    }
    return rows.join('');
  }

  function renderRoom(lobby){
    const uid      = session ? session.uid : null;
    const count    = memberCount(lobby);
    const cap      = parseInt(lobby.capacity) || 4;
    const isIn     = uid && lobby.members && lobby.members[uid];
    const isOwner  = uid && lobby.createdBy === uid;
    const launched = lobby.status === 'launched';
    const type     = lobby.type || 'PROYECTO';
    const color    = TYPE_COLORS[type] || 'var(--acid)';

    roomType.innerHTML = `<span class="type-tag ${type}">${type}</span>`;
    roomTitleEl.textContent = lobby.title || '';
    roomDescEl.textContent = lobby.desc || '';
    roomDescEl.style.display = lobby.desc ? '' : 'none';

    roomMeta.innerHTML = roomMetaHTML(lobby);

    const members = Object.values(lobby.members || {});
    let slotsHtml = '';
    for(let i = 0; i < cap; i++){
      const m = members[i];
      if(m){
        const initial = (m.name || '?').trim().charAt(0).toUpperCase() || '?';
        slotsHtml += `<div class="room-slot filled">
          <div class="room-slot-avatar" style="background:${color}22;color:${color};">${escHtml(initial)}</div>
          <div class="room-slot-name">${escHtml(m.name || '?')}</div>
        </div>`;
      } else {
        slotsHtml += `<div class="room-slot empty">
          <div class="room-slot-avatar">?</div>
          <div class="room-slot-name">esperando…</div>
        </div>`;
      }
    }
    roomSlots.innerHTML = slotsHtml;

    if(launched){
      roomStatus.className = 'launched';
      roomStatus.innerHTML = `<span class="launched-dot"></span> ¡SALA COMPLETA — COORDINÁ ACÁ O EN DISCORD!`;
    } else {
      roomStatus.className = '';
      roomStatus.innerHTML = `<span class="led-spin"></span> ESPERANDO JUGADORES… ${count}/${cap}`;
    }

    // ── chat: habilitar compositor solo a MIEMBROS (cliente; la regla lo refuerza)
    if(isIn){
      chatInput.disabled = false;
      chatSend.disabled  = false;
      chatInput.placeholder = 'Escribí en la sala…';
      chatNote.textContent = '';
    } else {
      chatInput.disabled = true;
      chatSend.disabled  = true;
      chatInput.placeholder = uid ? 'Unite a la sala para escribir' : 'Iniciá sesión para escribir';
      chatNote.textContent = uid ? 'Solo los miembros de la sala pueden escribir.' : 'Cualquiera puede leer; los miembros escriben.';
    }

    let actionsHtml = '';
    if(launched){
      actionsHtml += `<a class="card-btn discord" href="${DISCORD_INVITE}" target="_blank" rel="noopener">→ DISCORD</a>`;
    } else if(!uid){
      actionsHtml += `<a class="card-btn" href="home.html#comunidad">INICIÁ SESIÓN</a>`;
    } else if(isIn){
      actionsHtml += `<button class="card-btn dimmed" data-room-action="leave">SALIR DE LA SALA</button>`;
    } else if(count < cap){
      actionsHtml += `<button class="card-btn primary" data-room-action="join">UNIRSE A LA SALA</button>`;
    }
    if(launched && uid){
      // Discord queda secundario; recordatorio de que el chat in-app sigue vivo
    }
    if(isOwner && !launched){
      actionsHtml += `<button class="card-btn danger" data-room-action="close">✕ CERRAR SALA</button>`;
    }
    roomActions.innerHTML = actionsHtml;
  }

  // ── FRENTE 2 — CHAT IN-APP ─────────────────────────────────────────────
  async function fetchChat(id){
    try{
      const r = await fetch(`${FB_URL}/lobbies/${id}/chat.json?orderBy="ts"&limitToLast=80`);
      if(!r.ok) return null;
      const data = await r.json();
      if(!data) return [];
      return Object.values(data)
        .filter(m => m && typeof m.text === 'string')
        .sort((a,b) => (a.ts||0) - (b.ts||0));
    }catch(e){ return null; }
  }

  function fmtTime(ts){
    if(!ts) return '';
    try{
      const d = new Date(ts);
      return d.toLocaleTimeString('es-AR',{ hour:'2-digit', minute:'2-digit' });
    }catch(e){ return ''; }
  }

  function renderChat(msgs){
    if(msgs === null){ return; } // fallo de red puntual: no pisar lo mostrado
    const sig = msgs.map(m => `${m.ts}|${m.uid}`).join(',');
    if(sig === lastChatSig) return; // sin cambios → no re-render ni auto-scroll
    lastChatSig = sig;

    if(!msgs.length){
      chatLog.innerHTML = `<div class="chat-empty">Todavía no habló nadie. Rompé el hielo.</div>`;
      return;
    }
    const uid = session ? session.uid : null;
    chatLog.innerHTML = msgs.map(m => {
      const mine = uid && m.uid === uid ? ' mine' : '';
      return `<div class="chat-msg${mine}">
        <div class="chat-msg-head">
          <span class="chat-msg-name">${escHtml(m.name || '?')}</span>
          <span class="chat-msg-time">${escHtml(fmtTime(m.ts))}</span>
        </div>
        <div class="chat-msg-text">${escHtml(m.text)}</div>
      </div>`;
    }).join('');
    chatLog.scrollTop = chatLog.scrollHeight; // auto-scroll al fondo
  }

  async function refreshChat(){
    if(!roomLobbyId) return;
    const msgs = await fetchChat(roomLobbyId);
    renderChat(msgs);
  }

  async function sendChat(){
    if(!roomLobbyId || !session) return;
    const text = chatInput.value.trim();
    if(!text) return;
    if(text.length > 500){ return; }
    chatInput.value = '';
    chatSend.disabled = true;
    try{
      const token = await freshToken(session);
      const msg = {
        uid: session.uid,
        name: session.name || session.email || 'anónimo',
        text: text,
        ts: Date.now()
      };
      const r = await fetch(`${FB_URL}/lobbies/${roomLobbyId}/chat.json?auth=${token}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(msg)
      });
      if(r.ok){
        touchActivity(roomLobbyId, token); // chatear mantiene viva la sala
        await refreshChat();
      } else {
        // si la regla niega (no miembro / validación), devolvemos el texto
        chatInput.value = text;
      }
    }catch(e){
      chatInput.value = text;
    }finally{
      chatSend.disabled = chatInput.disabled;
    }
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
  });

  async function refreshRoom(){
    if(!roomLobbyId) return;
    const data = await fetchLobby(roomLobbyId);
    if(!data){ closeRoom(); loadLobbies(); return; }
    renderRoom({ id: roomLobbyId, ...data });
    refreshChat(); // chat poll junto al refreshRoom (cada ~4s)
  }

  function openRoom(id){
    roomLobbyId = id;
    lastChatSig = null;
    chatLog.innerHTML = `<div class="chat-empty">Cargando…</div>`;
    chatInput.value = '';
    roomOv.classList.add('show');
    refreshRoom();
    if(roomPollTimer) clearInterval(roomPollTimer);
    roomPollTimer = setInterval(refreshRoom, 4000);
  }

  function closeRoom(){
    roomOv.classList.remove('show');
    roomLobbyId = null;
    if(roomPollTimer){ clearInterval(roomPollTimer); roomPollTimer = null; }
  }

  roomClose.addEventListener('click', closeRoom);
  roomOv.addEventListener('click', e => { if(e.target === roomOv) closeRoom(); });

  roomActions.addEventListener('click', async e => {
    const btn = e.target.closest('[data-room-action]');
    if(!btn || btn.disabled || !roomLobbyId) return;
    const action = btn.dataset.roomAction;
    btn.disabled = true;
    if(action === 'join')  await joinLobby(roomLobbyId, {});
    if(action === 'leave') await leaveLobby(roomLobbyId);
    if(action === 'close'){ await closeLobby(roomLobbyId); closeRoom(); }
    await refreshRoom();
    await loadLobbies();
  });

  lobbyForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!session){ setFormStatus('Iniciá sesión primero.','err'); return; }

    const refEl = document.getElementById('f-ref');
    const refRaw = refEl.value.trim();
    const refClean = sanitizeUrl(refRaw);
    refEl.classList.remove('invalid');
    if(refClean === null){ // tiene texto pero no es http(s) válido
      refEl.classList.add('invalid');
      setFormStatus('El link de referencia debe empezar con http:// o https://','err');
      return;
    }

    formSubmit.disabled = true;
    setFormStatus('Creando sala…');
    const result = await createLobby({
      title:    document.getElementById('f-title').value.trim(),
      type:     document.getElementById('f-type').value,
      desc:     document.getElementById('f-desc').value.trim(),
      capacity: parseInt(document.getElementById('f-cap').value),
      roles:    document.getElementById('f-roles').value.trim(),
      tool:     document.getElementById('f-tool').value,
      startAt:  document.getElementById('f-start').value.trim(),
      refLink:  refClean // '' si vacío, url limpia si válida
    });
    if(result.ok){
      setFormStatus('¡Sala creada!','ok');
      await joinLobby(result.id, {});
      setTimeout(()=>{ closeModal(); loadLobbies(); openRoom(result.id); }, 600);
    } else {
      setFormStatus(`No se pudo crear la sala — ${result.error}`,'err');
    }
    formSubmit.disabled = false;
  });

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filt-btn');
    if(!btn) return;
    activeFilter = btn.dataset.filter;
    filterBar.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLobbies();
  });

  function init(){
    session = getSession();
    if(session){
      createBtn.disabled = false;
    } else {
      createBtn.title = 'Iniciá sesión para crear una sala';
    }
    loadLobbies();
    setInterval(loadLobbies, 15000);
  }

  init();
})();
</script>
<script defer src="chat-widget.js"></script>
</body>
</html>
