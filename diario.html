<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Diario HG — Tecnología para todos</title>
<meta name="description" content="Publicación diaria de Human Glitche — tecnología explicada de forma clara y accesible para todos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --paper:#f5f0e8;
  --ink:#1a1209;
  --ink-mid:#3d2e1a;
  --ink-light:#7a6a52;
  --ink-faint:#b8a990;
  --red:#8b1a1a;
  --rule:#c8b898;
  --serif:'Playfair Display',Georgia,serif;
  --body-serif:'Lora',Georgia,serif;
  --mono:'Space Mono',monospace;
}

html{ scroll-behavior:smooth; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body-serif);
  min-height:100vh;
  font-size:16px;
  line-height:1.7;
}

/* RUIDO DE PAPEL */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}

#wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 1.5rem 5rem;}

/* ── CABECERA PERIÓDICO ── */
#masthead{
  border-bottom:3px double var(--ink);
  padding:2rem 0 1rem;
  text-align:center;
  margin-bottom:0;
}
#masthead-eyebrow{
  font-family:var(--mono);font-size:8px;letter-spacing:0.25em;
  color:var(--ink-light);text-transform:uppercase;margin-bottom:0.6rem;
}
#masthead-title{
  font-family:var(--serif);font-size:clamp(3rem,8vw,6rem);
  font-weight:900;letter-spacing:-0.01em;line-height:0.95;
  color:var(--ink);
}
#masthead-title span{color:var(--red);}
#masthead-tagline{
  font-family:var(--serif);font-style:italic;font-size:1rem;
  color:var(--ink-mid);margin-top:0.5rem;
}
#masthead-meta{
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
  padding:0.45rem 0;margin-top:0.8rem;
  font-family:var(--mono);font-size:8px;letter-spacing:0.14em;
  color:var(--ink-light);text-transform:uppercase;
}

/* ── CATEGORÍAS ── */
#cats-bar{
  display:flex;gap:0;border-bottom:2px solid var(--ink);
  overflow-x:auto;scrollbar-width:none;margin-bottom:0;
}
#cats-bar::-webkit-scrollbar{display:none;}
.cat-btn{
  font-family:var(--mono);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.6rem 1rem;border:none;background:none;cursor:pointer;
  color:var(--ink-light);border-right:1px solid var(--rule);
  white-space:nowrap;transition:all 0.15s;
}
.cat-btn:first-child{padding-left:0;}
.cat-btn:hover{color:var(--ink);background:rgba(0,0,0,0.04);}
.cat-btn.active{color:var(--ink);font-weight:700;}

/* ── LAYOUT DE COLUMNAS ── */
#featured{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:2px solid var(--ink);
  gap:0;
}
@media(max-width:640px){#featured{grid-template-columns:1fr;}}

#note-del-dia{
  padding:1.8rem 1.8rem 1.8rem 0;
  border-right:1px solid var(--rule);
}
@media(max-width:640px){#note-del-dia{border-right:none;border-bottom:1px solid var(--rule);padding:1.4rem 0;}}

#notes-secondary{
  display:flex;flex-direction:column;
  padding:1.8rem 0 1.8rem 1.8rem;
  gap:0;
}
@media(max-width:640px){#notes-secondary{padding:1.4rem 0;}}

#notes-archive{
  padding-top:2rem;
  columns:2;column-gap:2rem;
}
@media(max-width:600px){#notes-archive{columns:1;}}

/* ── ARTÍCULOS ── */
.cat-tag{
  font-family:var(--mono);font-size:7.5px;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--red);margin-bottom:0.4rem;
  display:block;
}
.note-headline{
  font-family:var(--serif);font-weight:700;line-height:1.2;
  color:var(--ink);margin-bottom:0.5rem;
}
.note-headline a{color:inherit;text-decoration:none;}
.note-headline a:hover{text-decoration:underline;text-decoration-thickness:2px;}
.note-body{
  font-family:var(--body-serif);font-size:1rem;
  color:var(--ink-mid);line-height:1.75;
  margin-bottom:0.6rem;
}
.note-body p + p{margin-top:0.7em;}
.note-meta{
  font-family:var(--mono);font-size:7px;letter-spacing:0.12em;
  color:var(--ink-faint);text-transform:uppercase;
  border-top:1px solid var(--rule);padding-top:0.45rem;margin-top:0.6rem;
}

/* Nota principal — más grande */
#note-del-dia .note-headline{font-size:clamp(1.7rem,3.5vw,2.5rem);}
#note-del-dia .note-body{font-size:1.05rem;}

/* Notas secundarias */
.note-sec{
  padding-bottom:1.2rem;margin-bottom:1.2rem;
  border-bottom:1px solid var(--rule);
}
.note-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.note-sec .note-headline{font-size:1.1rem;}
.note-sec .note-body{font-size:0.9rem;line-height:1.65;}

/* Notas del archivo */
.note-arch{
  break-inside:avoid;
  padding-bottom:1.4rem;margin-bottom:1.4rem;
  border-bottom:1px solid var(--rule);
}
.note-arch:last-child{border-bottom:none;}
.note-arch .note-headline{font-size:1.05rem;}
.note-arch .note-body{font-size:0.88rem;color:var(--ink-light);}

/* ── MODAL NOTA COMPLETA ── */
#note-modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(26,18,9,0.7);
  align-items:flex-start;justify-content:center;
  padding:2rem 1rem;overflow-y:auto;
}
#note-modal.open{display:flex;}
#note-modal-inner{
  background:var(--paper);max-width:680px;width:100%;
  padding:2.5rem 2rem;border:2px solid var(--ink);
  position:relative;margin:auto;
}
#modal-close{
  position:absolute;top:1rem;right:1rem;
  font-family:var(--mono);font-size:10px;letter-spacing:0.1em;
  background:none;border:1px solid var(--rule);color:var(--ink-light);
  padding:5px 10px;cursor:pointer;
}
#modal-close:hover{border-color:var(--ink);color:var(--ink);}
#modal-cat{margin-bottom:0.3rem;}
#modal-headline{font-family:var(--serif);font-weight:900;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.15;margin-bottom:0.8rem;color:var(--ink);}
#modal-meta{font-family:var(--mono);font-size:7.5px;letter-spacing:0.14em;color:var(--ink-faint);text-transform:uppercase;border-bottom:2px solid var(--ink);padding-bottom:0.8rem;margin-bottom:1.2rem;}
#modal-body{font-family:var(--body-serif);font-size:1.05rem;color:var(--ink-mid);line-height:1.82;}
#modal-body p{margin-bottom:1em;}

/* ── EMPTY / LOADING ── */
#diario-loading{
  text-align:center;padding:4rem 0;
  font-family:var(--mono);font-size:9px;letter-spacing:0.2em;
  color:var(--ink-faint);text-transform:uppercase;
}
#diario-empty{
  grid-column:1/-1;text-align:center;padding:3rem 0;
  font-family:var(--serif);font-style:italic;font-size:1.15rem;
  color:var(--ink-light);
}

/* ── BACK LINK ── */
#back-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.8rem 0;border-bottom:1px solid var(--rule);margin-bottom:0;
}
#back-link{
  font-family:var(--mono);font-size:8px;letter-spacing:0.16em;
  color:var(--ink-light);text-decoration:none;text-transform:uppercase;
  transition:color 0.15s;
}
#back-link:hover{color:var(--ink);}
#hg-link{
  font-family:var(--mono);font-size:8px;letter-spacing:0.16em;
  color:var(--ink-light);text-decoration:none;text-transform:uppercase;
  transition:color 0.15s;
}
#hg-link:hover{color:var(--red);}
</style>
</head>
<body>

<div id="wrap">

  <div id="back-bar">
    <a id="back-link" href="index.html">← Human Glitche</a>
    <a id="hg-link" href="index.html">www.hg-vl.com</a>
  </div>

  <!-- CABECERA PERIÓDICO -->
  <div id="masthead">
    <div id="masthead-eyebrow">Publicación diaria de Human Glitche</div>
    <div id="masthead-title">El Diario <span>HG</span></div>
    <div id="masthead-tagline">Tecnología para todos — sin jerga, sin vueltas</div>
    <div id="masthead-meta">
      <span id="masthead-date">—</span>
      <span>Buenos Aires, Argentina</span>
      <span id="masthead-count">—</span>
    </div>
  </div>

  <!-- FILTRO DE CATEGORÍAS -->
  <div id="cats-bar">
    <button class="cat-btn active" data-cat="todas">Todas</button>
    <button class="cat-btn" data-cat="tecnología cotidiana">Tecnología cotidiana</button>
    <button class="cat-btn" data-cat="herramientas digitales">Herramientas digitales</button>
    <button class="cat-btn" data-cat="creatividad para todos">Creatividad para todos</button>
    <button class="cat-btn" data-cat="para empezar">Para empezar</button>
    <button class="cat-btn" data-cat="seguridad">Seguridad</button>
  </div>

  <!-- LOADING -->
  <div id="diario-loading">Cargando edición de hoy…</div>

  <!-- LAYOUT PRINCIPAL (ocultado hasta que carga) -->
  <div id="featured" style="display:none;">
    <div id="note-del-dia"><!-- nota principal --></div>
    <div id="notes-secondary"><!-- notas secundarias --></div>
  </div>

  <div id="notes-archive" style="display:none;"></div>

</div>

<!-- MODAL NOTA COMPLETA -->
<div id="note-modal">
  <div id="note-modal-inner">
    <button id="modal-close">✕ Cerrar</button>
    <span class="cat-tag" id="modal-cat"></span>
    <div id="modal-headline"></div>
    <div id="modal-meta"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  const FB_URL = 'https://hg-vl-shaders-default-rtdb.firebaseio.com';

  const CATS = ['todas','tecnología cotidiana','herramientas digitales','creatividad para todos','para empezar','seguridad'];

  let ALL_NOTES = [];
  let ACTIVE_CAT = 'todas';

  // ── Fecha al estilo periódico
  function fmtDate(ts){
    const d = ts ? new Date(ts) : new Date();
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  // ── Truncar texto
  function truncate(txt, len){
    if(!txt) return '';
    return txt.length > len ? txt.slice(0, len).trimEnd() + '…' : txt;
  }

  // ── Abrir modal con nota completa
  function openModal(note){
    document.getElementById('modal-cat').textContent = note.cat || '';
    document.getElementById('modal-headline').textContent = note.title || '';
    document.getElementById('modal-meta').textContent =
      `${fmtDate(note.publishedAt)} — publicado por el equipo HG`;
    document.getElementById('modal-body').innerHTML =
      (note.body || '').split('\n\n').map(p => `<p>${p}</p>`).join('');
    document.getElementById('note-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modal-close').addEventListener('click', ()=>{
    document.getElementById('note-modal').classList.remove('open');
    document.body.style.overflow = '';
  });
  document.getElementById('note-modal').addEventListener('click', e=>{
    if(e.target === e.currentTarget){
      document.getElementById('note-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  // ── Renderizar
  function render(){
    const notes = ACTIVE_CAT === 'todas'
      ? ALL_NOTES
      : ALL_NOTES.filter(n => (n.cat||'').toLowerCase() === ACTIVE_CAT);

    const featured   = document.getElementById('featured');
    const ndDiv      = document.getElementById('note-del-dia');
    const secDiv     = document.getElementById('notes-secondary');
    const archDiv    = document.getElementById('notes-archive');

    ndDiv.innerHTML = '';
    secDiv.innerHTML = '';
    archDiv.innerHTML = '';

    if(!notes.length){
      featured.style.display = 'none';
      archDiv.style.display = 'none';
      document.getElementById('diario-loading').style.display = 'block';
      document.getElementById('diario-loading').textContent = 'Todavía no hay notas en esta categoría — volvé pronto.';
      return;
    }

    document.getElementById('diario-loading').style.display = 'none';
    featured.style.display = 'grid';

    const [main, ...rest] = notes;

    // Nota principal
    ndDiv.innerHTML = `
      <span class="cat-tag">${main.cat || 'General'}</span>
      <div class="note-headline">${main.title}</div>
      <div class="note-body">${truncate(main.body, 320)}</div>
      <div class="note-meta">${fmtDate(main.publishedAt)}</div>
    `;
    ndDiv.querySelector('.note-headline').style.cursor = 'pointer';
    ndDiv.querySelector('.note-headline').addEventListener('click', ()=> openModal(main));

    // Secundarias (hasta 3)
    rest.slice(0, 3).forEach(note=>{
      const div = document.createElement('div');
      div.className = 'note-sec';
      div.innerHTML = `
        <span class="cat-tag">${note.cat || 'General'}</span>
        <div class="note-headline">${note.title}</div>
        <div class="note-body">${truncate(note.body, 140)}</div>
        <div class="note-meta">${fmtDate(note.publishedAt)}</div>
      `;
      div.querySelector('.note-headline').style.cursor = 'pointer';
      div.querySelector('.note-headline').addEventListener('click', ()=> openModal(note));
      secDiv.appendChild(div);
    });

    // Archivo
    const arch = rest.slice(3);
    if(arch.length){
      archDiv.style.display = 'block';
      arch.forEach(note=>{
        const div = document.createElement('div');
        div.className = 'note-arch';
        div.innerHTML = `
          <span class="cat-tag">${note.cat || 'General'}</span>
          <div class="note-headline">${note.title}</div>
          <div class="note-body">${truncate(note.body, 110)}</div>
          <div class="note-meta">${fmtDate(note.publishedAt)}</div>
        `;
        div.querySelector('.note-headline').style.cursor = 'pointer';
        div.querySelector('.note-headline').addEventListener('click', ()=> openModal(note));
        archDiv.appendChild(div);
      });
    } else {
      archDiv.style.display = 'none';
    }

    // Estadísticas en masthead
    document.getElementById('masthead-count').textContent = `${notes.length} nota${notes.length !== 1 ? 's' : ''}`;
  }

  // ── Filtro por categoría
  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      ACTIVE_CAT = btn.dataset.cat;
      document.querySelectorAll('.cat-btn').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── Cargar notas
  async function load(){
    document.getElementById('masthead-date').textContent = fmtDate().toUpperCase();
    try{
      const r = await fetch(`${FB_URL}/diario.json?orderBy="publishedAt"&limitToLast=40`);
      const data = r.ok ? (await r.json() || {}) : {};
      ALL_NOTES = Object.entries(data)
        .map(([id, note]) => ({ id, ...note }))
        .filter(n => n.published !== false)
        .sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));
      render();
    }catch(e){
      document.getElementById('diario-loading').textContent = 'No se pudo cargar el diario — probá de nuevo en un momento.';
    }
  }

  load();
})();
</script>
</body>
</html>
