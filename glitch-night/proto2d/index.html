<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLITCH NIGHT · prototipo 2.5D ilustrado</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#05060a;overflow:hidden;font-family:'Space Mono',ui-monospace,monospace;}
  #wrap{position:fixed;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;
    /* empuje cómic: más contraste y saturación, como el concept art */
    filter:contrast(1.12) saturate(1.22) brightness(1.02);}
  /* scanlines + viñeta como overlay (look ilustración nocturna) */
  #fx{position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);}
  #vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 70% 65% at 50% 42%, rgba(0,0,0,0) 40%, rgba(3,4,10,.85) 100%);}
  #hud{position:absolute;left:16px;bottom:14px;color:#b8ff00;font-size:11px;letter-spacing:.14em;
    text-shadow:0 0 8px rgba(184,255,0,.6);opacity:.85;}
  #hud b{color:#ff2d55;}
  #tag{position:absolute;right:16px;top:14px;color:rgba(240,237,230,.55);font-size:9px;letter-spacing:.22em;text-align:right;line-height:1.7;}
  #load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3ad0ff;font-size:12px;letter-spacing:.2em;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="fx"></div>
  <div id="vig"></div>
  <div id="load">CARGANDO CIUDAD…</div>
  <div id="hud">← → CAMINAR &nbsp;·&nbsp; <b>GLITCH NIGHT</b> · prototipo 2.5D</div>
  <div id="tag">ESTÉTICA HIGGSFIELD · CAPAS ILUSTRADAS<br>skyline · fachada · asfalto (assets reales)</div>
</div>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){ W=innerWidth;H=innerHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// ---- carga de assets (ilustraciones de Higgsfield) ----
function load(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
function loadOpt(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; }); } // opcional: no falla si no existe
const A={};
Promise.all([
  load('assets/skyline.jpg').then(i=>A.sky=i),
  load('assets/facade.jpg').then(i=>A.fac=i),
  load('assets/asphalt.jpg').then(i=>A.asp=i),
  loadOpt('assets/char.png').then(i=>{ if(i) A.char=i; }),   // sprite recortado del personaje (cuando exista)
]).then(start).catch(()=>{ document.getElementById('load').textContent='faltan assets en ./assets/'; });

// ---- estado ----
const S={ x:0, vx:0, t:0, bob:0, walking:false, mouseX:0.5 };
const keys={};
addEventListener('keydown',e=>{ keys[e.key]=true; });
addEventListener('keyup',e=>{ keys[e.key]=false; });
addEventListener('mousemove',e=>{ S.mouseX=e.clientX/innerWidth; });

// dibuja una imagen tileada horizontalmente en una banda [y, y+h], con scroll off
function tileBand(img, off, y, h, alpha){
  const scale=h/img.height, tw=img.width*scale;
  let x=-(((off%tw)+tw)%tw);
  ctx.globalAlpha=alpha==null?1:alpha;
  while(x<W){ ctx.drawImage(img,0,0,img.width,img.height, x,y,tw,h); x+=tw-0.5; }
  ctx.globalAlpha=1;
}

// personaje placeholder (vista de espaldas con mochila) — reemplazable por sprite Higgsfield
function drawChar(cx, cy, bob){
  ctx.save(); ctx.translate(cx, cy+bob);
  // sombra/halo acid en el piso (como en la ref del pibe caminando)
  ctx.globalAlpha=.5; ctx.fillStyle='#b8ff00';
  ctx.beginPath(); ctx.ellipse(0,4,26,7,0,0,7); ctx.fill(); ctx.globalAlpha=1;
  // sprite real recortado (si está); si no, placeholder dibujado
  if(A.char){ const h=170, w=A.char.width/A.char.height*h; ctx.drawImage(A.char,-w/2,-h+8,w,h); ctx.restore(); return; }
  // cuerpo
  ctx.fillStyle='#14121c'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
  roundRect(-16,-64,32,56,8); ctx.fill(); ctx.stroke();
  // mochila
  ctx.fillStyle='#241a34'; roundRect(-13,-58,26,34,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3ad0ff'; ctx.globalAlpha=.5; roundRect(-6,-50,12,8,2); ctx.fill(); ctx.globalAlpha=1;
  // cabeza
  ctx.fillStyle='#181521'; ctx.beginPath(); ctx.arc(0,-74,11,0,7); ctx.fill(); ctx.stroke();
  // pelo puntas
  ctx.fillStyle='#0d0b12'; for(let i=-8;i<=8;i+=4){ ctx.beginPath(); ctx.moveTo(i,-82); ctx.lineTo(i+2,-92); ctx.lineTo(i+4,-82); ctx.fill(); }
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

let last=0;
function frame(ts){
  const dt=Math.min(0.05,(ts-last)/1000||0); last=ts; S.t+=dt;
  // input
  const dir=(keys['ArrowRight']||keys['d']||keys['D']?1:0)-(keys['ArrowLeft']||keys['a']||keys['A']?1:0);
  S.walking=dir!==0;
  S.vx += (dir*260 - S.vx)*Math.min(1,dt*8);
  S.x += S.vx*dt;
  S.bob = S.walking ? Math.sin(S.t*12)*3 : Math.sin(S.t*2)*1.2;
  const sway=(S.mouseX-0.5)*24;

  ctx.clearRect(0,0,W,H);
  // cielo nocturno
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0716'); g.addColorStop(.55,'#141033'); g.addColorStop(1,'#0a0a18');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const horizon=H*0.62;
  // capa lejana: skyline (parallax lento) — ocupa desde ~18% hasta el horizonte
  const skyH=horizon-H*0.12;
  tileBand(A.sky, S.x*0.12 + sway*0.3, H*0.12, skyH, 0.95);
  // neblina/haze sobre el skyline para fundir con el fondo
  const hz=ctx.createLinearGradient(0,H*0.12,0,horizon); hz.addColorStop(0,'rgba(20,16,51,.0)'); hz.addColorStop(1,'rgba(10,10,24,.55)');
  ctx.fillStyle=hz; ctx.fillRect(0,H*0.12,W,skyH);

  // capa media: fachada de edificios (parallax medio) — banda alta sobre la vereda
  const facH=H*0.5;
  tileBand(A.fac, S.x*0.5 + sway, horizon-facH, facH, 1);

  // calle (asfalto) en primer plano + reflejo neón
  const streetY=horizon; const streetH=H-horizon;
  tileBand(A.asp, S.x*1.0, streetY, streetH, 1);
  // brillo húmedo: gradiente de color neón reflejado
  const refl=ctx.createLinearGradient(0,streetY,0,H); refl.addColorStop(0,'rgba(184,255,0,.10)'); refl.addColorStop(.4,'rgba(255,45,85,.06)'); refl.addColorStop(1,'rgba(58,208,255,.04)');
  ctx.globalCompositeOperation='screen'; ctx.fillStyle=refl; ctx.fillRect(0,streetY,W,streetH); ctx.globalCompositeOperation='source-over';

  // personaje centrado, parado sobre la vereda
  drawChar(W/2 + sway*0.4, horizon+streetH*0.42, S.bob);

  requestAnimationFrame(frame);
}
function start(){ document.getElementById('load').style.display='none'; requestAnimationFrame(frame); }
</script>
</body>
</html>
