<style>
  :root{ --acid:#b8ff00; --glitch:#ff2d55; --cyan:#3ad0ff; --ink:#f0ede6; --line:rgba(240,237,230,.12); --bg:#050505; }

  #panel{position:fixed;right:0;top:0;bottom:0;width:312px;z-index:9;background:rgba(5,5,5,.72);backdrop-filter:blur(9px);border-left:1px solid var(--line);
    padding:70px 18px 18px;overflow:auto;transition:transform .25s;}

  h2{font-size:9px;letter-spacing:.2em;color:rgba(240,237,230,.4);text-transform:uppercase;margin:0 0 9px;}
  .fams{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:16px;}
  .fam{background:rgba(184,255,0,.04);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:10px;padding:7px 4px;cursor:pointer;border-radius:3px;transition:.15s;}
  .fam:hover{border-color:var(--acid);color:var(--acid);}

  .ctrl{margin-bottom:11px;}
  .ctrl label{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.06em;color:rgba(240,237,230,.65);margin-bottom:4px;}
  .ctrl label b{color:var(--acid);font-weight:400;}
  .ctrl input[type=range]{width:100%;accent-color:var(--acid);}
  .cols{display:flex;gap:7px;margin:6px 0 16px;}
  .cols .c{flex:1;}
  .cols .c span{display:block;font-size:8px;letter-spacing:.1em;color:rgba(240,237,230,.4);margin-bottom:3px;text-transform:uppercase;}
  .cols input[type=color]{width:100%;height:30px;border:1px solid var(--line);background:none;cursor:pointer;border-radius:3px;}
  #gen{width:100%;background:var(--acid);color:#050505;border:none;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;
    padding:12px;cursor:pointer;border-radius:4px;margin-bottom:8px;transition:filter .15s;}
  #gen:hover{filter:brightness(1.12);}
  .row{display:flex;gap:7px;}
  .row button{flex:1;background:transparent;border:1px solid var(--line);color:var(--ink);font:inherit;font-size:10px;letter-spacing:.12em;padding:9px;cursor:pointer;border-radius:3px;transition:.15s;}
  .row button:hover{border-color:var(--acid);color:var(--acid);}
  .seedline{font-size:9px;letter-spacing:.1em;color:rgba(240,237,230,.35);margin:12px 0 0;text-align:center;}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:20;background:rgba(5,5,5,.94);border:1px solid var(--acid);color:var(--acid);
    font-size:11px;padding:9px 16px;border-radius:5px;opacity:0;transition:opacity .2s;pointer-events:none;}
  #toast.show{opacity:1;}
  .hint{position:fixed;left:20px;bottom:18px;z-index:8;font-size:10px;letter-spacing:.1em;color:rgba(240,237,230,.4);pointer-events:none;}
  .hint b{color:var(--acid);font-weight:400;}
  @media(max-width:640px){ #panel{width:100%;} .brand{font-size:24px;} }

<canvas id="gl"></canvas>
<div id="top">
  <div class="brand lab"><b>THE</b> FORGE<span class="sub">Human Glitche · generador de shaders</span></div>
  <div style="display:flex;gap:18px;pointer-events:auto;">
    <a href="/aether-2/">AETHER ↔</a>

</div>
<button id="toggle">⚙ PANEL</button>

<div id="panel">
  <h2>Familia</h2>

  <h2>Parámetros</h2>
  <div class="ctrl"><label>escala <b data-v="scale"></b></label><input type="range" id="scale" min="0.5" max="6" step="0.01"></div>
  <div class="ctrl"><label>warp (distorsión) <b data-v="warp"></b></label><input type="range" id="warp" min="0" max="1.5" step="0.01"></div>
  <div class="ctrl"><label>simetría (kaleido) <b data-v="sym"></b></label><input type="range" id="sym" min="0" max="12" step="1"></div>

    <button id="copyBtn">⧉ COPIAR</button>
  </div>

</div>
<div id="toast"></div>

<script type="module">
import { Renderer } from 'https://esm.sh/interactive-shader-format';

const FAMILIES = ['KALEIDO','PLASMA','TÚNEL','VORONOI','ONDAS','FRACTAL','RAYMARCH','TRUCHET','MOIRÉ','HEX','ESPIRAL','METABALLS','KIFS','CAUSTICS','FLOW','MÁRMOL','CRISTAL','GRID'];

const SHADER_BODY = `
float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
vec2 hash2(vec2 p){ return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453); }
float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1.0,0.0)),u.x),mix(hash(i+vec2(0.0,1.0)),hash(i+vec2(1.0,1.0)),u.x),u.y); }
float fbm(vec2 p){ float v=0.0,a=0.55; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; } return v; }
float voro(vec2 p){ vec2 g=floor(p),f=fract(p); float f1=1.5,f2=1.5;
  for(int y=-1;y<=1;y++){ for(int x=-1;x<=1;x++){ vec2 o=vec2(float(x),float(y));
    vec2 r=o+hash2(g+o)-f; float d=dot(r,r);
    if(d<f1){ f2=f1; f1=d; } else if(d<f2){ f2=d; } } }
  return clamp((sqrt(f2)-sqrt(f1)), 0.0, 1.0); }
float julia(vec2 p, float t){ vec2 c=0.7*vec2(cos(t*0.3),sin(t*0.37)); vec2 z=p*0.55; float it=0.0;
  for(int i=0;i<40;i++){ z=vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y)+c; if(dot(z,z)>4.0)break; it+=1.0; } return it/40.0; }
float sdf3(vec3 q){ vec3 r=mod(q+1.0,2.0)-1.0; return length(r)-0.46; }
float raymarch(vec2 uv, float t){ vec3 ro=vec3(0.0,0.0,t*0.8); vec3 rd=normalize(vec3(uv,1.2));
  float glow=0.0, d=0.1;
  for(int i=0;i<40;i++){ float dist=sdf3(ro+rd*d); glow+=0.02/(abs(dist)+0.06); d+=max(abs(dist)*0.6,0.045); if(d>14.0)break; }
  return clamp(glow*0.13,0.0,1.0); }
float truchet(vec2 p, float t){ vec2 ip=floor(p),fp=fract(p); if(hash(ip)<0.5)fp.x=1.0-fp.x;
  float d=min(abs(length(fp)-0.5),abs(length(fp-1.0)-0.5)); return smoothstep(0.07+0.02*sin(t),0.0,d); }
float moire(vec2 p, float t){ float a=0.0; for(int i=0;i<3;i++){ float an=t*0.2+float(i)*1.047;
  vec2 q=mat2(cos(an),-sin(an),sin(an),cos(an))*p; a+=sin(q.x*6.0)*sin(q.y*6.0); } return 0.5+0.5*(a/3.0); }
float hexs(vec2 p, float t){ vec2 s=vec2(1.7320508,1.0); vec2 a=mod(p,s)-s*0.5; vec2 b=mod(p-s*0.5,s)-s*0.5;
  vec2 gv=dot(a,a)<dot(b,b)?a:b; vec2 id=p-gv; float ed=0.5-max(abs(gv.x)*0.866+abs(gv.y)*0.5,abs(gv.y));
  float c=hash(floor(id)+0.3); return smoothstep(0.0,0.07,ed)*(0.4+0.6*(0.5+0.5*sin(c*26.0+t*1.6))); }
float espiral(vec2 p, float t){ float a=atan(p.y,p.x); float r=length(p); return 0.5+0.5*sin(a*5.0+log(r+0.12)*6.0-t*2.0); }
float metaballs(vec2 p, float t){ float v=0.0; for(int i=0;i<5;i++){ float fi=float(i);
  vec2 c=1.3*vec2(sin(t*0.4+fi*1.7),cos(t*0.33+fi*2.3)); v+=0.33/(length(p-c)+0.05); } return smoothstep(1.5,3.6,v); }
float kifs(vec2 p, float t){ p*=1.2; float s=1.0,d=1e9; float ang=0.5+0.2*sin(t*0.3);
  mat2 R=mat2(cos(ang),-sin(ang),sin(ang),cos(ang));
  for(int i=0;i<6;i++){ p=abs(p)-0.55; p=R*p; p*=1.35; s*=1.35; d=min(d,(length(p)-0.45)/s); } return smoothstep(0.07,0.0,abs(d)); }
float caustics(vec2 p, float t){ vec2 q=p; for(int i=0;i<4;i++){ float fi=float(i)+1.0;
  q+=0.5*vec2(sin(q.y*fi*1.3+t),cos(q.x*fi*1.1-t*0.8))/fi; } float c=abs(sin(q.x*2.0)*sin(q.y*2.0)); return pow(1.0-c,2.0); }
float flow(vec2 p, float t){ vec2 q=p; for(int i=0;i<3;i++){ q+=0.4*vec2(fbm(q+t*0.2),fbm(q.yx-t*0.15)); } return fbm(q*1.5); }
float marmol(vec2 p, float t){ float n=fbm(p*1.5+t*0.1); return 0.5+0.5*sin((p.x+p.y)*1.5+n*6.0); }
float cristal(vec2 p, float t){ vec2 g=floor(p),f=fract(p); float f1=1.5; vec2 mr=vec2(0.0);
  for(int y=-1;y<=1;y++){ for(int x=-1;x<=1;x++){ vec2 o=vec2(float(x),float(y));
    vec2 r=o+0.5+0.4*sin(t*0.5+6.2831*hash2(g+o))-f; float d=dot(r,r); if(d<f1){ f1=d; mr=r; } } } return 0.4+0.6*abs(mr.x+mr.y); }
float grid(vec2 uv, float t){ if(uv.y>-0.02) return 0.0; float persp=1.0/(-uv.y);
  float gx=abs(fract(uv.x*persp*0.5)-0.5); float gz=abs(fract(persp*0.6+t)-0.5);
  float line=max(smoothstep(0.04,0.0,gx),smoothstep(0.06,0.0,gz)); return line*smoothstep(0.0,-0.7,uv.y); }
vec2 kaleido(vec2 uv, float folds){ if(folds<0.5) return uv;
  float a=atan(uv.y,uv.x); float r=length(uv); float seg=3.14159265/folds;
  a=abs(mod(a,2.0*seg)-seg); return vec2(cos(a),sin(a))*r; }
float pattern(vec2 p, float t){
  float m=floor(mode+0.5);
  bool noWarp=(m>4.5 && m<6.5) || (m>11.5 && m<12.5) || (m>15.5);   // fractal/raymarch/kifs/cristal/grid: sin domain-warp
  if(warp>0.001 && !noWarp){ vec2 q=vec2(fbm(p+t*0.1), fbm(p+vec2(5.2,1.3)-t*0.08)); p+=warp*(q-0.5)*2.0; }
  if(m<0.5){ return fbm(p+t*0.15); }
  else if(m<1.5){ float v=sin(p.x*1.5+t)+sin(p.y*1.7-t*0.8)+sin((p.x+p.y)*1.1+t*0.6)+sin(length(p)*2.0-t); return 0.5+0.125*v; }
  else if(m<2.5){ float r=length(p)+0.001; float a=atan(p.y,p.x); float z=1.0/r+t*0.8; return 0.5+0.5*sin(a*4.0+z*1.5)*smoothstep(2.2,0.0,r); }
  else if(m<3.5){ return voro(p*1.2+t*0.1); }
  else if(m<4.5){ float s=0.0; for(int k=0;k<3;k++){ float fk=float(k); vec2 c=vec2(sin(t*0.3+fk*2.1),cos(t*0.27+fk*1.3))*1.2; s+=sin(length(p-c)*3.0-t*1.2); } return 0.5+0.5*(s/3.0); }
  else if(m<5.5){ return julia(p*0.7, t); }
  else if(m<6.5){ return raymarch(p*0.5, t); }
  else if(m<7.5){ return truchet(p, t); }
  else if(m<8.5){ return moire(p, t); }
  else if(m<9.5){ return hexs(p, t); }
  else if(m<10.5){ return espiral(p, t); }
  else if(m<11.5){ return metaballs(p, t); }
  else if(m<12.5){ return kifs(p, t); }
  else if(m<13.5){ return caustics(p, t); }
  else if(m<14.5){ return flow(p, t); }
  else if(m<15.5){ return marmol(p, t); }
  else if(m<16.5){ return cristal(p, t); }
  else { return grid(p, t); }
}
vec3 pal(float t){ t=clamp(t,0.0,1.0); vec3 c=mix(colA.rgb,colB.rgb,smoothstep(0.0,0.55,t)); c=mix(c,colC.rgb,smoothstep(0.5,1.0,t)); return c; }
void main(){
  vec2 uv=isf_FragNormCoord-0.5; uv.x*=RENDERSIZE.x/RENDERSIZE.y;
  float t=TIME*speed;
  uv=kaleido(uv, floor(sym));
  vec2 p=uv*scale;
  float gt=floor(TIME*12.0); float burst=step(0.86,hash(vec2(gt,3.7)))*glitch;
  float ln=floor(isf_FragNormCoord.y*30.0); p.x+=(hash(vec2(ln,gt))-0.5)*burst*0.3;
  float sep=0.01+burst*0.05;
  float fr=pattern(p+vec2(sep,0.0),t); float fg=pattern(p,t); float fb=pattern(p-vec2(sep,0.0),t);
  vec3 col; col.r=pal(fr).r; col.g=pal(fg).g; col.b=pal(fb).b;
  col+=pal(fg)*smoothstep(0.72,1.0,fg)*0.55;
  col=pow(max(col,0.0),vec3(0.9));
  col+=(hash(isf_FragNormCoord*RENDERSIZE.xy+TIME)-0.5)*0.04;
  col*=smoothstep(1.25,0.3,length(isf_FragNormCoord-0.5));
  gl_FragColor=vec4(max(col,0.0),1.0);
}`;

// estado de parámetros
const P = { mode:0, scale:2.2, warp:0.5, sym:0, speed:0.4, glitch:0.2,
  colA:[0.02,0.02,0.03], colB:[0.72,1.0,0.0], colC:[1.0,0.18,0.33] };
let seed = 1;

function isfHeader(){
  return JSON.stringify({
    DESCRIPTION:'The Forge · '+FAMILIES[P.mode]+' · Human Glitche', CREDIT:'Human Glitche', ISFVSN:'2',
    CATEGORIES:['generator','procedural'],
    INPUTS:[
      {NAME:'mode',TYPE:'float',DEFAULT:P.mode,MIN:0,MAX:17},
      {NAME:'scale',TYPE:'float',DEFAULT:r2(P.scale),MIN:0.5,MAX:6},
      {NAME:'warp',TYPE:'float',DEFAULT:r2(P.warp),MIN:0,MAX:1.5},
      {NAME:'sym',TYPE:'float',DEFAULT:P.sym,MIN:0,MAX:12},
      {NAME:'speed',TYPE:'float',DEFAULT:r2(P.speed),MIN:0,MAX:2},
      {NAME:'glitch',TYPE:'float',DEFAULT:r2(P.glitch),MIN:0,MAX:1},
      {NAME:'colA',TYPE:'color',DEFAULT:P.colA.concat(1).map(r3)},
      {NAME:'colB',TYPE:'color',DEFAULT:P.colB.concat(1).map(r3)},
      {NAME:'colC',TYPE:'color',DEFAULT:P.colC.concat(1).map(r3)}
    ]},null,2);
}
const r2=x=>Math.round(x*100)/100, r3=x=>Math.round(x*1000)/1000;
function isfSource(){ return '/*'+isfHeader()+'*/\n'+SHADER_BODY; }

// runtime
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl',{preserveDrawingBuffer:true,antialias:true});
const renderer=new Renderer(gl);
function resize(){ const d=Math.min(devicePixelRatio,2); canvas.width=innerWidth*d; canvas.height=innerHeight*d; }
resize(); addEventListener('resize',resize);
renderer.loadSource(isfSource());
function frame(){ requestAnimationFrame(frame); try{ renderer.draw(canvas); }catch(e){} }
requestAnimationFrame(frame);

function applyAll(){
  renderer.setValue('mode',P.mode); renderer.setValue('scale',P.scale); renderer.setValue('warp',P.warp);
  renderer.setValue('sym',P.sym); renderer.setValue('speed',P.speed); renderer.setValue('glitch',P.glitch);
  renderer.setValue('colA',P.colA.concat(1)); renderer.setValue('colB',P.colB.concat(1)); renderer.setValue('colC',P.colC.concat(1));
}

// color helpers
function hsl(h,s,l){ h=((h%1)+1)%1; const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h*12)%12; return l-a*Math.max(-1,Math.min(k-3,Math.min(9-k,1)));};
  return [f(0),f(8),f(4)]; }
function toHex(c){ return '#'+c.map(x=>('0'+Math.round(Math.max(0,Math.min(1,x))*255).toString(16)).slice(-2)).join(''); }
function fromHex(h){ return [parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255]; }

// GENERAR — recipe aleatoria con buen gusto
function roll(){
  seed = Math.floor(Math.random()*1e6);
  P.mode = Math.floor(Math.random()*FAMILIES.length);
  P.scale = 1.8 + Math.random()*3.0;                        // piso más alto = más detalle, menos lavado
  P.warp = 0.15 + Math.random()*Math.random()*1.2;          // algo de distorsión siempre
  P.sym = Math.random()<0.35 ? 0 : (3+Math.floor(Math.random()*8));   // más chance de kaleidoscopio
  P.speed = 0.2 + Math.random()*0.9;
  P.glitch = Math.random()<0.4 ? 0 : Math.random()*0.55;
  // paleta armónica: base + esquema (complementario/triada/análogo)
  const h0=Math.random(), schemes=[0.5,0.33,-0.33,0.08,0.14], h1=(h0+schemes[Math.floor(Math.random()*schemes.length)]+1)%1;
  P.colA = hsl(h0, 0.45+Math.random()*0.3, 0.03+Math.random()*0.05);   // fondo casi negro, tintado
  P.colB = hsl(h0, 0.8+Math.random()*0.2, 0.5+Math.random()*0.12);     // medio vivo
  P.colC = hsl(h1, 0.85+Math.random()*0.15, 0.55+Math.random()*0.15);  // acento
  syncUI(); applyAll();
}

// UI
const famsEl=document.getElementById('fams');
FAMILIES.forEach((f,i)=>{ const b=document.createElement('button'); b.className='fam'; b.textContent=f; b.dataset.i=i;
  b.addEventListener('click',()=>{ P.mode=i; syncUI(); applyAll(); }); famsEl.appendChild(b); });
const sliders=['scale','warp','sym','speed','glitch'];
sliders.forEach(id=>{ document.getElementById(id).addEventListener('input',e=>{ P[id]=+e.target.value; syncUI(); applyAll(); }); });
['colA','colB','colC'].forEach(id=>{ document.getElementById(id).addEventListener('input',e=>{ P[id]=fromHex(e.target.value); applyAll(); }); });
function syncUI(){
  [...famsEl.children].forEach((b,i)=>b.classList.toggle('on',i===P.mode));
  sliders.forEach(id=>{ document.getElementById(id).value=P[id];
    const v=document.querySelector('[data-v="'+id+'"]'); if(v) v.textContent=(id==='sym')?String(Math.round(P[id])):(+P[id]).toFixed(2); });
  document.getElementById('colA').value=toHex(P.colA);
  document.getElementById('colB').value=toHex(P.colB);
  document.getElementById('colC').value=toHex(P.colC);
  document.getElementById('seedline').textContent='semilla '+seed+' · '+FAMILIES[P.mode];
}

// botones
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(el._h); el._h=setTimeout(()=>el.classList.remove('show'),2200); }
document.getElementById('gen').addEventListener('click',roll);
document.getElementById('exportBtn').addEventListener('click',()=>{ const blob=new Blob([isfSource()],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='forge-'+FAMILIES[P.mode].toLowerCase()+'-'+seed+'.fs'; a.click(); URL.revokeObjectURL(a.href); toast('descargado .fs — arrastralo a VDMX'); });
document.getElementById('copyBtn').addEventListener('click',async()=>{ try{ await navigator.clipboard.writeText(isfSource()); toast('código ISF copiado'); }catch(e){ toast('no se pudo copiar'); } });
document.getElementById('toggle').addEventListener('click',()=>document.getElementById('panel').classList.toggle('hide'));
addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT')return; if(e.key==='g'||e.key==='G')roll(); if(e.key==='s'||e.key==='S')document.getElementById('exportBtn').click(); });

syncUI(); applyAll();
</script></body></html>
